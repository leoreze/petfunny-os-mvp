<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>WhatsApp · PetFunny OS</title>
  
  <link rel="icon" type="image/png" sizes="64x64" href="/assets/img/favicon-petfunny.png">
  <link rel="shortcut icon" href="/favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/img/apple-touch-icon.png">
  <meta name="msapplication-TileColor" content="#26b9c7">
  <link rel="manifest" href="/admin-manifest.webmanifest">
  <meta name="theme-color" content="#01ADB7">
  <link rel="stylesheet" href="/assets/css/app.css">
</head>
<body>
<script type="module">
  import { buildShell, setupPremiumInteractions, bigNumberGrid } from '/assets/js/shell.js';
  import { api } from '/assets/js/api.js';
  import { showLoading, hideLoading } from '/assets/js/loading.js';
  import { showToast } from '/assets/js/toast.js';
  import { generateWhatsAppMessage, openWhatsAppUrl } from '/assets/js/whatsapp.js';

  const state = { templates: [], status: null, conversations: [] };

  buildShell({
    active: 'WhatsApp',
    eyebrow: 'Atendimento híbrido',
    title: 'WhatsApp inteligente',
    subtitle: 'Agente conectado à WhatsApp Cloud API, com webhook, resposta automática, histórico de conversas e fallback para atendimento humano.',
    content: `
      <section class="hero-panel stack-md">
        <div class="page-heading-row between">
          <div>
            <p class="eyebrow">Cloud API + agente híbrido</p>
            <h1>Agente WhatsApp PetFunny</h1>
            <p>Receba mensagens pelo webhook oficial, responda automaticamente com IA/regras do PetFunny e assuma a conversa quando precisar de atendimento humano.</p>
          </div>
          <span class="badge">Agente: IA + atendente</span>
        </div>
        <div id="whatsapp-metrics">${bigNumberGrid([['Webhook','Pronto','recebe mensagens'],['Resposta','Automática','com fallback'],['Atendente','Handoff','quando necessário']])}</div>
      </section>

      <section class="module-card stack-md" id="agent-status-card">
        <div class="table-header">
          <div><h3>Status do agente</h3><p>Configure as variáveis do .env, cole a URL de callback na Meta e acompanhe se o agente está respondendo.</p></div>
          <button class="btn btn-secondary" id="refresh-agent" type="button">Atualizar</button>
        </div>
        <div id="agent-status" class="muted">Carregando status do agente...</div>
      </section>

      <section class="module-card stack-md" id="agent-conversations-card">
        <div class="table-header">
          <div><h3>Conversas recentes</h3><p>Mensagens recebidas pelo webhook do WhatsApp Cloud API.</p></div>
        </div>
        <div id="agent-conversations" class="stack-sm"></div>
      </section>

      <section class="module-card stack-md">
        <div class="table-header">
          <div><h3>Gerar mensagem rápida</h3><p>Escolha o tipo de contato, informe o WhatsApp e personalize a mensagem se quiser.</p></div>
        </div>
        <form id="whatsapp-form" class="form-grid form-row-gap">
          <label class="form-field"><span>Tipo de mensagem</span><select class="select" id="template-type"></select></label>
          <label class="form-field"><span>WhatsApp do cliente</span><input class="input" id="phone" data-mask="whatsapp" placeholder="(16) 98153-5338"></label>
          <label class="form-field"><span>Nome do pet</span><input class="input" id="pet-name" placeholder="Ex.: Mel, Thor, Luna"></label>
          <label class="form-field"><span>Serviço ou assunto</span><input class="input" id="service" placeholder="Ex.: banho e tosa completa"></label>
          <label class="form-field form-span-2"><span>Mensagem personalizada opcional</span><textarea class="textarea" id="custom-message" rows="4" placeholder="Use apenas se quiser substituir o texto padrão gerado pelo sistema."></textarea></label>
          <div class="actions form-span-2"><button class="btn" type="submit">💬 Gerar e abrir WhatsApp</button><button class="btn btn-secondary" type="button" id="preview-btn">Pré-visualizar mensagem</button></div>
        </form>
      </section>

      <section class="module-grid">
        <article class="module-card"><h3>Agenda</h3><p>Confirmação de horário, lembrete, aviso de atraso e encaixe disponível.</p></article>
        <article class="module-card"><h3>Financeiro</h3><p>Cobrança amigável de pendências sem tom agressivo.</p></article>
        <article class="module-card"><h3>Pacotes</h3><p>Renovação preventiva antes da última sessão.</p></article>
        <article class="module-card"><h3>CRM</h3><p>Reativação de clientes inativos e pós-atendimento.</p></article>
      </section>

      <dialog class="modal-shell" id="preview-modal">
        <form method="dialog">
          <header><strong>Mensagem gerada</strong><button class="icon-btn" value="cancel">×</button></header>
          <div class="modal-scroll custom-scroll"><pre class="codebox" id="preview-text"></pre></div>
          <footer><button class="btn btn-secondary" value="cancel">Fechar</button><button class="btn" id="open-preview-whatsapp" type="button">Abrir no WhatsApp</button></footer>
        </form>
      </dialog>
    `
  });

  const $ = (s) => document.querySelector(s);
  let lastPreview = null;

  function payload() {
    return {
      type: $('#template-type').value,
      phone: $('#phone').value,
      custom: {
        petName: $('#pet-name').value,
        service: $('#service').value,
        message: $('#custom-message').value
      }
    };
  }

  function renderAgentStatus(status = {}) {
    const ok = status.cloudConfigured;
    const callback = status.callbackUrl || '';
    const metrics = status.metrics || {};
    $('#agent-status').innerHTML = `
      <div class="module-grid compact-grid">
        <article class="soft-card"><strong>${ok ? '✅ Cloud API configurada' : '⚠️ Falta configurar Cloud API'}</strong><p>${ok ? 'Token e Phone Number ID encontrados no ambiente.' : 'Preencha WHATSAPP_ACCESS_TOKEN e WHATSAPP_PHONE_NUMBER_ID no .env.'}</p></article>
        <article class="soft-card"><strong>${status.agentEnabled ? '✅ Agente ativo' : '⏸️ Agente pausado'}</strong><p>Auto resposta: ${status.autoReply ? 'ativada' : 'desativada'} · OpenAI: ${status.openaiConfigured ? 'configurada' : 'fallback local'}</p></article>
        <article class="soft-card"><strong>${metrics.conversations || 0} conversa(s)</strong><p>${metrics.inbound || 0} recebidas · ${metrics.outbound || 0} enviadas · ${metrics.handoff || 0} em handoff.</p></article>
      </div>
      <div class="codebox" style="white-space:normal;word-break:break-all;margin-top:12px"><strong>Callback URL:</strong> ${callback || 'Configure APP_URL no .env para gerar a URL pública.'}<br><strong>Verify token:</strong> WHATSAPP_VERIFY_TOKEN</div>
    `;
  }

  function renderConversations(items = []) {
    if (!items.length) {
      $('#agent-conversations').innerHTML = '<div class="empty-state"><strong>Nenhuma conversa recebida ainda.</strong><p>Depois que a Meta enviar mensagens para o webhook, elas aparecem aqui.</p></div>';
      return;
    }
    $('#agent-conversations').innerHTML = items.map((item) => `
      <article class="soft-card">
        <div class="page-heading-row between">
          <div><strong>${item.profileName || item.tutorName || item.phone}</strong><p>${item.phone}${item.tutorName ? ` · Tutor: ${item.tutorName}` : ''}</p></div>
          <span class="badge ${item.handoffRequired ? 'badge-danger' : ''}">${item.handoffRequired ? 'Handoff' : item.intent || 'geral'}</span>
        </div>
        <p class="muted">${item.summary || 'Sem resumo ainda.'}</p>
      </article>
    `).join('');
  }

  async function loadAgent() {
    try {
      const [status, conversations] = await Promise.all([
        api.get('/whatsapp/agent/status'),
        api.get('/whatsapp/agent/conversations?limit=12')
      ]);
      state.status = status;
      state.conversations = conversations.items || [];
      renderAgentStatus(status);
      renderConversations(state.conversations);
    } catch (error) {
      $('#agent-status').innerHTML = `<div class="empty-state"><strong>Agente ainda não inicializado.</strong><p>${error.message || 'Verifique o banco e as variáveis de ambiente.'}</p></div>`;
      renderConversations([]);
    }
  }

  async function loadTemplates() {
    showLoading('Carregando WhatsApp inteligente...', 'Preparando modelos de mensagem do PetFunny.');
    try {
      const data = await api.get('/whatsapp/templates');
      state.templates = data.templates || [];
      $('#template-type').innerHTML = state.templates.map(t => `<option value="${t.code}">${t.name} · ${t.module}</option>`).join('');
      window.dispatchEvent(new Event('petfunny:page-ready'));
    } catch (error) {
      showToast(error.message || 'Erro ao carregar modelos de WhatsApp.', 'error');
    } finally { hideLoading(); }
  }

  async function preview() {
    showLoading('Gerando mensagem...', 'Aplicando o texto ideal para WhatsApp.');
    try {
      lastPreview = await generateWhatsAppMessage(payload());
      $('#preview-text').textContent = lastPreview.message || '';
      $('#preview-modal').showModal();
      return lastPreview;
    } catch (error) {
      showToast(error.message || 'Erro ao gerar mensagem.', 'error');
      return null;
    } finally { hideLoading(); }
  }

  $('#refresh-agent').addEventListener('click', loadAgent);
  $('#preview-btn').addEventListener('click', preview);
  $('#whatsapp-form').addEventListener('submit', async (event) => {
    event.preventDefault();
    const data = await preview();
    if (data?.url) openWhatsAppUrl(data.url);
  });
  $('#open-preview-whatsapp').addEventListener('click', () => openWhatsAppUrl(lastPreview?.url));

  setupPremiumInteractions(document);
  loadTemplates();
  loadAgent();
</script>
</body>
</html>
