<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>CRM Operacional · PetFunny OS</title>
  <link rel="icon" type="image/png" sizes="64x64" href="/assets/img/favicon-petfunny.png">
  <link rel="shortcut icon" href="/favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/img/apple-touch-icon.png">
  <link rel="manifest" href="/admin-manifest.webmanifest">
  <meta name="theme-color" content="#01ADB7">
  <link rel="stylesheet" href="/assets/css/app.css">
</head>
<body>
<script type="module">
  import { buildShell, bigNumberGrid, setupPremiumInteractions } from '/assets/js/shell.js';
  import { api } from '/assets/js/api.js';
  import { toast } from '/assets/js/toast.js';
  import { finishPageLoading } from '/assets/js/loading.js';

  document.body.classList.add('crm-marketing-page', 'crm-operacional-page');

  const state = { items: [], metrics: {}, segments: [], search: '', crmStatus: 'all', appStatus: 'all', visible: 24, sortBy: 'priority', sortDir: 'desc' };
  const $ = (id) => document.getElementById(id);
  const esc = (v='') => String(v ?? '').replace(/[&<>"]/g, (m) => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;' }[m]));
  const wa = (v='') => String(v || '').replace(/\D/g, '');
  const fmtDate = (v) => v ? new Date(v).toLocaleDateString('pt-BR') : '—';
  const fmtDateTime = (v) => v ? new Date(v).toLocaleString('pt-BR', { dateStyle:'short', timeStyle:'short' }) : '—';
  const money = (cents=0) => (Number(cents || 0) / 100).toLocaleString('pt-BR', { style:'currency', currency:'BRL' });
  const debounce = (fn, wait=240) => { let t; return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), wait); }; };

  const content = `
    <section class="hero-panel stack-lg crm-hero-panel">
      <div class="page-heading-row between">
        <div>
          <p class="eyebrow">CRM Operacional PetFunny</p>
          <h1>Retenção, recorrência e reativação</h1>
          <p>Veja quais tutores estão ativos, quem nunca acessou o app, quem está em risco, quem tem pacote, ossinhos, indicações e próxima ação recomendada.</p>
        </div>
        <div class="actions">
          <button class="btn btn-secondary" id="refresh-crm" type="button">↻ Atualizar</button>
          <a class="btn" href="/admin/app-acessos">Acessos do App</a>
        </div>
      </div>
      <div id="crm-metrics">${bigNumberGrid([
        ['Tutores', '—', 'base total'],
        ['Ativos/recorrentes', '—', 'relacionamento saudável'],
        ['Em risco', '—', 'precisam de WhatsApp'],
        ['Nunca acessaram', '—', 'ativação do app']
      ])}</div>
    </section>

    <section class="grid-auto page-section" id="crm-segments"></section>

    <section class="module-card stack-md crm-list-card">
      <div class="section-toolbar stacked-toolbar">
        <div class="toolbar-copy-line">
          <div>
            <h3>Base de tutores com inteligência CRM</h3>
            <p>Dados reais de tutores, pets, agenda, pacotes, acessos do app, ossinhos e indicações. Use a ação sugerida para aumentar recorrência.</p>
          </div>
        </div>
        <div class="filter-row compact-filter-row filters-below crm-filter-row">
          <input class="input" id="crm-search" placeholder="Buscar tutor, pet ou WhatsApp" autocomplete="off">
          <select class="select" id="crm-status">
            <option value="all">Todos os status CRM</option>
            <option value="novo_lead">Novo lead</option>
            <option value="ativo">Ativo</option>
            <option value="recorrente">Recorrente</option>
            <option value="vip">Cliente VIP</option>
            <option value="cliente_ouro">Cliente Ouro</option>
            <option value="em_atencao">Em atenção</option>
            <option value="em_risco">Em risco</option>
            <option value="perdido">Perdido</option>
          </select>
          <select class="select" id="app-status">
            <option value="all">Todos os acessos</option>
            <option value="nunca_acessou">Nunca acessou</option>
            <option value="acessou_hoje">Acessou hoje</option>
            <option value="ativo_app">Ativo no app</option>
            <option value="inativo_7">Inativo 7+ dias</option>
            <option value="inativo_30">Inativo 30+ dias</option>
          </select>
          <button class="btn btn-secondary" id="clear-crm-filters" type="button">Limpar</button>
        </div>
      </div>
      <div class="table-scroll custom-scroll infinite-list no-inner-scroll" id="crm-scroll">
        <table class="premium-table crm-table">
          <thead><tr>
            <th><span class="th-label">Tutor</span><button class="th-arrow-only crm-sort" data-sort="name" type="button"><span class="sort-arrow">↕</span></button></th>
            <th><span class="th-label">Pets</span></th>
            <th><span class="th-label">Agenda</span><button class="th-arrow-only crm-sort" data-sort="daysWithoutAppointment" type="button"><span class="sort-arrow">↕</span></button></th>
            <th><span class="th-label">Status CRM</span><button class="th-arrow-only crm-sort" data-sort="crm" type="button"><span class="sort-arrow">↕</span></button></th>
            <th><span class="th-label">App</span><button class="th-arrow-only crm-sort" data-sort="totalAccesses" type="button"><span class="sort-arrow">↕</span></button></th>
            <th><span class="th-label">Ossinhos / Indicações</span></th>
            <th><span class="th-label">Ação sugerida</span></th>
            <th>Ações</th>
          </tr></thead>
          <tbody id="crm-body"><tr><td colspan="8">Carregando CRM operacional...</td></tr></tbody>
        </table>
        <div class="infinite-loader" id="crm-loader" hidden>Carregando mais tutores...</div>
      </div>
    </section>

    <section class="grid-two page-section">
      <article class="module-card stack-md"><div class="section-toolbar"><div><p class="eyebrow">Retenção</p><h3>Prioridades de hoje</h3><p>Clientes que merecem ação imediata para não perder recorrência.</p></div></div><div class="cards-list" id="priority-list"></div></article>
      <article class="module-card stack-md"><div class="section-toolbar"><div><p class="eyebrow">App do Tutor</p><h3>Ativação digital</h3><p>Quem ainda precisa receber convite para acessar o app.</p></div></div><div class="cards-list" id="activation-list"></div></article>
    </section>
  `;

  buildShell({ active: 'crm', title: 'CRM Operacional', subtitle: 'Retenção e relacionamento com dados reais', content });
  setupPremiumInteractions?.();

  const crmOrder = { perdido: 0, em_risco: 1, em_atencao: 2, novo_lead: 3, ativo: 4, recorrente: 5, vip: 6, cliente_ouro: 7 };
  const priorityScore = (item) => {
    if (item.crmStatus?.code === 'em_risco') return 100;
    if (item.crmStatus?.code === 'perdido') return 95;
    if (item.crmStatus?.code === 'em_atencao') return 90;
    if (item.appStatus?.code === 'nunca_acessou') return 80;
    if (item.crmStatus?.code === 'novo_lead') return 70;
    if (!item.activePackages && item.appointmentsCount >= 2) return 60;
    return 20;
  };
  const badgeClass = (tone='info') => tone === 'danger' ? 'danger' : tone === 'warning' ? 'warning' : tone === 'success' ? 'success' : tone === 'gold' ? 'warning' : 'soft';
  const whatsappUrl = (phone, message) => `https://wa.me/${wa(phone)}?text=${encodeURIComponent(message || '')}`;

  function filteredItems(){
    const q = state.search.trim().toLowerCase();
    let list = state.items.filter(item => {
      const matchText = !q || `${item.name} ${item.whatsapp} ${item.email} ${item.petNames}`.toLowerCase().includes(q);
      const matchCrm = state.crmStatus === 'all' || item.crmStatus?.code === state.crmStatus;
      const matchApp = state.appStatus === 'all' || item.appStatus?.code === state.appStatus;
      return matchText && matchCrm && matchApp;
    });
    const dir = state.sortDir === 'asc' ? 1 : -1;
    list.sort((a,b) => {
      if (state.sortBy === 'priority') return (priorityScore(a) - priorityScore(b)) * -1;
      if (state.sortBy === 'name') return String(a.name||'').localeCompare(String(b.name||''), 'pt-BR') * dir;
      if (state.sortBy === 'daysWithoutAppointment') return (Number(a.daysWithoutAppointment ?? 9999) - Number(b.daysWithoutAppointment ?? 9999)) * dir;
      if (state.sortBy === 'totalAccesses') return (Number(a.totalAccesses||0) - Number(b.totalAccesses||0)) * dir;
      if (state.sortBy === 'crm') return ((crmOrder[a.crmStatus?.code] ?? 99) - (crmOrder[b.crmStatus?.code] ?? 99)) * dir;
      return 0;
    });
    return list;
  }

  function renderMetrics(){
    const m = state.metrics || {};
    $('crm-metrics').innerHTML = bigNumberGrid([
      ['Tutores', String(m.totalTutors || 0), 'base total'],
      ['Ativos/recorrentes', String(m.activeTutors || 0), 'relacionamento saudável'],
      ['Em risco', String(m.atRiskTutors || 0), 'precisam de WhatsApp'],
      ['Nunca acessaram', String(m.neverAccessed || 0), 'ativação do app'],
      ['Ossinhos ativos', String(m.pointsBalance || 0), 'saldo na base'],
      ['Indicações', String(m.referrals || 0), `${m.convertedReferrals || 0} convertidas`],
      ['Pacotes ativos', String(m.activePackages || 0), 'recorrência comercial'],
      ['Acessos ao app', String(m.totalAccesses || 0), `${m.accessedToday || 0} hoje`]
    ]);
  }

  function renderSegments(){
    $('crm-segments').innerHTML = (state.segments || []).map(seg => `
      <article class="module-card compact-card">
        <p class="eyebrow">${esc(seg.label)}</p>
        <h3>${Number(seg.count || 0)}</h3>
        <p>${esc(seg.action || '')}</p>
      </article>
    `).join('');
  }

  function actionMenu(item){
    const activation = `Oi, ${item.name}! Agora você pode acompanhar agenda, mimos, fotos e cuidados do seu pet pelo App PetFunny: https://agendapetfunny.com.br/app`;
    const reactivation = `Oi, ${item.name}! Sentimos falta do seu pet por aqui 🐾 Você pode escolher o próximo horário pelo App PetFunny: https://agendapetfunny.com.br/app`;
    const packageMsg = `Oi, ${item.name}! Temos pacotes para manter a rotina do seu pet com economia e recorrência. Veja pelo app: https://agendapetfunny.com.br/app`;
    const healthMsg = `Oi, ${item.name}! O App PetFunny também acompanha Saúde 360, dicas de cuidado e teleconsulta veterinária. Acesse: https://agendapetfunny.com.br/app`;
    return `<div class="kebab-wrap">
      <button class="icon-btn kebab-btn" type="button" aria-label="Ações">⋯</button>
      <div class="kebab-menu app-kebab-menu">
        <a target="_blank" rel="noopener" href="${whatsappUrl(item.whatsapp, item.suggestedAction?.message)}">${esc(item.suggestedAction?.label || 'Enviar WhatsApp')}</a>
        <a target="_blank" rel="noopener" href="${whatsappUrl(item.whatsapp, activation)}">Ativar app</a>
        <a target="_blank" rel="noopener" href="${whatsappUrl(item.whatsapp, reactivation)}">Reativar cliente</a>
        <a target="_blank" rel="noopener" href="${whatsappUrl(item.whatsapp, packageMsg)}">Ofertar pacote</a>
        <a target="_blank" rel="noopener" href="${whatsappUrl(item.whatsapp, healthMsg)}">Saúde 360</a>
        <a href="/admin/tutores?tutor=${esc(item.id)}">Abrir tutor</a>
        <a href="/admin/app-acessos?tutor=${esc(item.id)}">Ver acessos</a>
      </div>
    </div>`;
  }

  function renderRows(reset=false){
    const list = filteredItems();
    if (reset) state.visible = 24;
    const shown = list.slice(0, state.visible);
    $('crm-body').innerHTML = shown.map(item => `
      <tr>
        <td><strong>${esc(item.name)}</strong><br><small>${esc(item.whatsapp || item.email || 'Sem contato')}</small></td>
        <td><strong>${Number(item.petsCount || 0)}</strong><br><small>${esc(item.petNames || 'Sem pet cadastrado')}</small></td>
        <td><strong>${Number(item.appointmentsCount || 0)} ag.</strong><br><small>Último: ${fmtDate(item.lastAppointmentAt)} · ${item.daysWithoutAppointment === null ? 'sem histórico' : `${item.daysWithoutAppointment} dias`}</small>${item.nextAppointmentAt ? `<br><small>Próximo: ${fmtDateTime(item.nextAppointmentAt)}</small>` : ''}</td>
        <td><span class="badge ${badgeClass(item.crmStatus?.tone)}">${esc(item.crmStatus?.label || '—')}</span><br><small>${Number(item.activePackages || 0)} pacote(s) ativo(s)</small></td>
        <td><span class="badge ${badgeClass(item.appStatus?.tone)}">${esc(item.appStatus?.label || '—')}</span><br><small>${Number(item.totalAccesses || 0)} acesso(s) · ${esc(item.lastAction || item.lastPage || '—')}</small></td>
        <td><strong>🦴 ${Number(item.pointsBalance || 0)}</strong><br><small>${Number(item.referralsCount || 0)} indicação(ões) · ${Number(item.referralsConverted || 0)} convertida(s)</small></td>
        <td><strong>${esc(item.suggestedAction?.label || 'Acompanhar')}</strong><br><small>${money(item.paidCents || 0)} em receita registrada</small></td>
        <td>${actionMenu(item)}</td>
      </tr>
    `).join('') || '<tr><td colspan="8">Nenhum tutor encontrado.</td></tr>';
    $('crm-loader').hidden = state.visible >= list.length;
    attachKebabMenus();
  }

  function renderPriority(){
    const priority = [...state.items].sort((a,b) => priorityScore(b)-priorityScore(a)).slice(0, 8);
    $('priority-list').innerHTML = priority.map(item => `<article class="module-card compact-card"><strong>${esc(item.name)}</strong><small>${esc(item.crmStatus?.label)} · ${item.daysWithoutAppointment === null ? 'sem agendamento' : `${item.daysWithoutAppointment} dias sem agendar`}</small><p>${esc(item.suggestedAction?.label || '')}</p><a class="btn btn-secondary" target="_blank" rel="noopener" href="${whatsappUrl(item.whatsapp, item.suggestedAction?.message)}">Enviar WhatsApp</a></article>`).join('') || '<p class="empty-small">Sem prioridades agora.</p>';
    const activation = state.items.filter(item => item.appStatus?.code === 'nunca_acessou').slice(0, 8);
    $('activation-list').innerHTML = activation.map(item => `<article class="module-card compact-card"><strong>${esc(item.name)}</strong><small>${esc(item.whatsapp || 'Sem WhatsApp')} · ${Number(item.petsCount || 0)} pet(s)</small><p>Nunca acessou o App do Tutor.</p><a class="btn btn-secondary" target="_blank" rel="noopener" href="${whatsappUrl(item.whatsapp, `Oi, ${item.name}! Acesse o App PetFunny para acompanhar agenda, mimos, fotos e cuidados: https://agendapetfunny.com.br/app`)}">Ativar app</a></article>`).join('') || '<p class="empty-small">Todos os tutores principais já têm acesso registrado.</p>';
  }

  function attachKebabMenus(){
    document.querySelectorAll('.kebab-btn').forEach(btn => {
      btn.onclick = (event) => {
        event.stopPropagation();
        const wrap = btn.closest('.kebab-wrap');
        document.querySelectorAll('.kebab-wrap.open').forEach(el => { if(el !== wrap) el.classList.remove('open'); });
        wrap?.classList.toggle('open');
      };
    });
  }
  document.addEventListener('click', () => document.querySelectorAll('.kebab-wrap.open').forEach(el => el.classList.remove('open')));

  async function load(){
    try {
      const data = await api.get('/api/crm/operational');
      state.items = data.items || [];
      state.metrics = data.metrics || {};
      state.segments = data.segments || [];
      renderMetrics(); renderSegments(); renderRows(true); renderPriority();
    } catch(error) {
      toast.error(error.message || 'Erro ao carregar CRM operacional.');
      $('crm-body').innerHTML = '<tr><td colspan="8">Não foi possível carregar os dados do CRM operacional.</td></tr>';
    }
  }

  $('refresh-crm').addEventListener('click', load);
  $('clear-crm-filters').addEventListener('click', () => { state.search=''; state.crmStatus='all'; state.appStatus='all'; $('crm-search').value=''; $('crm-status').value='all'; $('app-status').value='all'; renderRows(true); });
  $('crm-search').addEventListener('input', debounce(() => { state.search = $('crm-search').value; renderRows(true); }));
  $('crm-status').addEventListener('change', () => { state.crmStatus = $('crm-status').value; renderRows(true); });
  $('app-status').addEventListener('change', () => { state.appStatus = $('app-status').value; renderRows(true); });
  document.querySelectorAll('.crm-sort').forEach(btn => btn.addEventListener('click', () => { const key=btn.dataset.sort; state.sortDir = state.sortBy === key && state.sortDir === 'asc' ? 'desc' : 'asc'; state.sortBy = key; renderRows(true); }));
  window.addEventListener('scroll', () => { const total = filteredItems().length; if((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 260 && state.visible < total) { state.visible += 24; renderRows(); } }, { passive:true });

  load().finally(() => finishPageLoading());
</script>
</body>
</html>
