<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Recibo PetFunny</title>
  <link rel="icon" type="image/png" sizes="64x64" href="/assets/img/favicon-petfunny.png">
  <link rel="shortcut icon" href="/favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/img/apple-touch-icon.png">
  <meta name="msapplication-TileColor" content="#26b9c7">
  <link rel="stylesheet" href="/assets/css/app.css"></head><body class="public-doc-body"><main class="public-doc-wrap"><div id="public-receipt">Carregando recibo...</div><div class="public-doc-actions"><button class="btn secondary" onclick="window.print()">Imprimir</button></div></main><script type="module">
const money=(c=0)=>(Number(c||0)/100).toLocaleString('pt-BR',{style:'currency',currency:'BRL'}); const dt=(v)=>v?new Date(v).toLocaleString('pt-BR',{timeZone:'America/Sao_Paulo',dateStyle:'short',timeStyle:'short'}):'—';
const token=location.pathname.split('/').filter(Boolean).pop();
function html(receipt){ const p=receipt.payload||{}, a=p.appointment||{}, b=p.business||{}, t=p.totals||{}, pay=p.payment||{}; const paymentStatus=a.paymentStatusName||(a.paymentStatus==='paid'?'Pago':'Pendente'); const paymentMethod=pay.paymentMethodName||pay.payment_method_name||a.paymentMethodName||'A definir'; return `<article class="print-document public-print agenda-inline-document"><div class="doc-brand"><img src="/assets/img/logo-petfunny-full.png" alt="PetFunny"><div><strong>${b.name||'PetFunny - Banho e Tosa'}</strong><small>${b.address||'Ribeirão Preto / SP'} · ${b.whatsapp||''}</small></div></div><div class="doc-head"><div><p class="eyebrow">Recibo oficial</p><h2>Recibo</h2><p>Pagamento recebido e atendimento documentado.</p></div><div class="doc-number"><span>Nº</span><strong>${receipt.documentNumber||'—'}</strong></div></div><div class="doc-grid"><div><span>Tutor</span><strong>${a.tutorName||'—'}</strong><small>${a.tutorWhatsapp||''}</small></div><div><span>Pet</span><strong>${a.petName||'—'}</strong></div><div><span>Data</span><strong>${dt(a.startsAt)}</strong></div><div><span>Emitido em</span><strong>${dt(receipt.issuedAt)}</strong></div><div><span>Pagamento</span><strong>${paymentStatus}</strong></div><div><span>Forma de pagamento</span><strong>${paymentMethod}</strong></div></div><table class="doc-table"><thead><tr><th>Serviço</th><th>Qtd.</th><th>Unitário</th><th>Total</th></tr></thead><tbody>${(a.items||[]).map(i=>`<tr><td>${i.description}</td><td>${i.quantity}</td><td>${money(i.unitPriceCents)}</td><td>${money(i.totalCents)}</td></tr>`).join('')||`<tr><td colspan="4">${a.services||'Atendimento PetFunny'}</td></tr>`}</tbody></table><div class="doc-totals"><div><span>Total original</span><strong>${money(t.subtotalCents)}</strong></div><div><span>Desconto</span><strong>${money(t.discountCents)} · ${t.discountPercent||0}%</strong></div><div class="doc-total-final"><span>Total final</span><strong>${money(t.totalCents)}</strong></div></div><footer class="doc-footer">Obrigado pela confiança no PetFunny. Recibo gerado eletronicamente.</footer></article>`; }
fetch(`/api/public/recibos/${token}`).then(r=>r.json()).then(data=>{ if(data.error) throw new Error(data.error); document.getElementById('public-receipt').innerHTML=html(data.receipt); }).catch(e=>{ document.getElementById('public-receipt').innerHTML=`<div class="card"><h1>Recibo não encontrado</h1><p>${e.message}</p></div>`; });
</script></body></html>
