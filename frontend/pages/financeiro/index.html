<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Financeiro · PetFunny OS</title>
  
  <link rel="icon" type="image/png" sizes="64x64" href="/assets/img/favicon-petfunny.png">
  <link rel="shortcut icon" href="/favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/img/apple-touch-icon.png">
  <meta name="msapplication-TileColor" content="#26b9c7">
  <link rel="stylesheet" href="/assets/css/app.css">
  <style>
    .finance-v2-metric{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 14px;border:1px solid rgba(20,36,43,.09);border-radius:16px;background:rgba(255,255,255,.78);box-shadow:0 10px 24px rgba(18,41,49,.05)}
    .finance-v2-metric strong{display:block;color:#14242b}.finance-v2-metric small{display:block;color:#64777f}.finance-v2-metric b{font-size:1.04rem;color:#00a9b7;white-space:nowrap}.finance-v2-danger b{color:#d94646}.finance-v2-warning b{color:#d97706}.finance-v2-ok b{color:#0f9f6e}
  </style>
</head>
<body>
<script type="module">
  import { buildShell, setupPremiumInteractions } from '/assets/js/shell.js';
  import { api } from '/assets/js/api.js';
  import { showLoading, hideLoading } from '/assets/js/loading.js';
  import { showToast } from '/assets/js/toast.js';
  import { bindHybridWhatsAppButtons } from '/assets/js/whatsapp.js';

  const todayIso = new Date().toISOString().slice(0, 10);
  const firstDayOfMonth = new Date(new Date().getFullYear(), new Date().getMonth(), 1).toISOString().slice(0, 10);
  const currentMonth = new Date().toISOString().slice(0, 7);

  const state = {
    summary: null,
    financeV2: null,
    financeV3: null,
    options: { paymentMethods: [], tutors: [], categories: [], statuses: [], types: [] },
    transactions: [],
    defaulters: [],
    page: 1,
    limit: 30,
    total: 0,
    filters: { search: '', status: 'all', type: 'all', category: 'all', period: 'month', month: currentMonth, startDate: firstDayOfMonth, endDate: todayIso, dateType: 'due' },
    activeTab: ['inadimplentes','comissoes','conciliacao','servicos','projecao','caixa-futuro','indicadores','executivo'].includes(new URLSearchParams(window.location.search).get('tab')) ? new URLSearchParams(window.location.search).get('tab') : 'lancamentos',
    sortBy: 'dueDate',
    sortDir: 'asc',
    defaulterSortBy: 'dueDate',
    defaulterSortDir: 'asc',
    loadingMore: false,
    done: false,
    editingTransactionId: null
  };

  const money = (cents = 0) => (Number(cents || 0) / 100).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
  const dateBR = (value) => value ? new Date(value).toLocaleDateString('pt-BR') : '—';
  const statusLabel = { pending: 'Pendente', paid: 'Pago', overdue: 'Vencido', canceled: 'Cancelado' };
  const typeLabel = { income: 'Entrada', expense: 'Saída' };
  const statusTone = { pending: 'warning', paid: 'success', overdue: 'danger', canceled: 'neutral' };
  const $ = (s) => document.querySelector(s);
  const esc = (value='') => String(value ?? '').replace(/[&<>"']/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]));

  function layout() {
    return `
      <section class="finance-page finance-admin-page page-stack compact-stack">
        <section class="hero-panel stack-md finance-hero-panel">
          <div class="page-heading-row between">
            <div>
              <p class="eyebrow">Controle financeiro</p>
              <h1>Financeiro 360°</h1>
              <p>Controle caixa real, valores previstos, vencimentos, inadimplência e despesas com leitura por data de vencimento, pagamento ou lançamento.</p>
            </div>
            <div class="actions no-card-actions">
              <button class="btn btn-secondary" type="button" id="refresh-finance">↻ Atualizar</button>
              <button class="btn btn-secondary" type="button" id="export-finance-csv">Exportar Excel</button>
              <button class="btn btn-secondary" type="button" id="export-finance-pdf">Exportar PDF</button>
              <button class="btn" type="button" id="new-transaction">＋ Novo lançamento</button>
            </div>
          </div>
          <div class="finance-tabs finance-tabs-360"><button class="finance-tab active" data-finance-tab="lancamentos">Lançamentos</button><button class="finance-tab" data-finance-tab="inadimplentes">Inadimplência</button><button class="finance-tab" type="button" data-finance-tab="comissoes">Comissões</button><button class="finance-tab" type="button" data-finance-tab="conciliacao">Conciliação</button><button class="finance-tab" type="button" data-finance-tab="servicos">Serviços & margem</button><button class="finance-tab" type="button" data-finance-tab="projecao">Projeção</button><button class="finance-tab" type="button" data-finance-tab="caixa-futuro">Caixa futuro</button><button class="finance-tab" type="button" data-finance-tab="indicadores">Indicadores</button><button class="finance-tab" type="button" data-finance-tab="executivo">Executivo</button><button class="finance-tab" type="button" data-finance-filter-shortcut="income">Recebimentos</button><button class="finance-tab" type="button" data-finance-filter-shortcut="expense">Despesas</button><button class="finance-tab" type="button" data-finance-filter-shortcut="pending">Vencimentos</button></div>
        </section>

        <section class="admin-big-numbers-strip finance-big-numbers-strip" aria-label="Indicadores financeiros">
          <div class="big-number-grid finance-metrics" id="finance-metrics"></div>
        </section>

        <section class="module-grid finance-grid-2 finance-support-grid">
          <article class="module-card finance-card stack-sm">
            <div class="table-header"><div><h3>Fluxo de Caixa do período</h3><p>Entradas e saídas por vencimento. Caixa realizado usa data de pagamento e auditoria usa lançamento.</p></div></div>
            <div class="finance-bars" id="finance-flow"></div>
          </article>
          <article class="module-card finance-card stack-sm">
            <div class="table-header"><div><h3>Distribuição por categoria</h3><p>Entenda receitas e despesas por vencimento, sem distorcer por data de lançamento.</p></div></div>
            <div class="finance-category-list" id="finance-categories"></div>
          </article>
        </section>

        <section class="module-grid finance-grid-3 finance-360-grid">
          <article class="module-card finance-card stack-sm">
            <div class="table-header"><div><h3>Recebimentos de hoje</h3><p>Caixa realizado por forma de pagamento.</p></div></div>
            <div class="finance-mini-list" id="finance-receipts-today"></div>
          </article>
          <article class="module-card finance-card stack-sm">
            <div class="table-header"><div><h3>Vencimentos próximos</h3><p>Cobranças e contas abertas para os próximos 7 dias.</p></div></div>
            <div class="finance-mini-list" id="finance-upcoming"></div>
          </article>
          <article class="module-card finance-card stack-sm">
            <div class="table-header"><div><h3>Alertas importantes</h3><p>Pontos de atenção para decisão rápida.</p></div></div>
            <div class="finance-alert-list" id="finance-alerts"></div>
          </article>
        </section>

        <section class="module-card stack-md finance-list-card" id="commissions-card" hidden>
          <div class="section-toolbar stacked-toolbar">
            <div class="toolbar-copy-line finance-consulta-copy"><div><h3>Comissões</h3><p>Cálculo por colaborador com regra progressiva PetFunny: 11–12 pets/dia = 5%, 13–14 = 8%, 15+ = 10%.</p></div><span class="badge">Financeiro 360° v2</span></div>
          </div>
          <div class="table-scroll custom-scroll no-inner-scroll finance-table-scroll"><table class="premium-table finance-records-table"><thead><tr><th>Colaborador</th><th>Serviços</th><th>Faturamento</th><th>% médio</th><th>Comissão estimada</th></tr></thead><tbody id="finance-commissions-list"><tr><td colspan="5">Carregando comissões...</td></tr></tbody></table></div>
        </section>

        <section class="module-card stack-md finance-list-card" id="reconciliation-card" hidden>
          <div class="section-toolbar stacked-toolbar">
            <div class="toolbar-copy-line finance-consulta-copy"><div><h3>Conciliação Pix/Cartão</h3><p>Compara valor previsto no financeiro com pagamentos registrados por Pix, cartão ou lançamento manual.</p></div><span class="badge">Pix / Cartão / Caixa</span></div>
          </div>
          <div class="table-scroll custom-scroll no-inner-scroll finance-table-scroll"><table class="premium-table finance-records-table"><thead><tr><th>Vencimento</th><th>Cliente/Pet</th><th>Lançamento</th><th>Forma</th><th>Previsto</th><th>Recebido</th><th>Diferença</th><th>Status</th></tr></thead><tbody id="finance-reconciliation-list"><tr><td colspan="8">Carregando conciliação...</td></tr></tbody></table></div>
        </section>

        <section class="module-grid finance-grid-2" id="services-card" hidden>
          <article class="module-card finance-card stack-sm"><div class="table-header"><div><h3>Receita por serviço</h3><p>Quantidade, receita e ticket médio por serviço no período.</p></div></div><div class="finance-category-list" id="finance-service-revenue"></div></article>
          <article class="module-card finance-card stack-sm"><div class="table-header"><div><h3>Margem por serviço</h3><p>Estimativa de custo operacional e margem por categoria de serviço.</p></div></div><div class="finance-category-list" id="finance-service-margin"></div></article>
        </section>


        <section class="module-grid finance-grid-2" id="projection-card" hidden>
          <article class="module-card finance-card stack-sm"><div class="table-header"><div><h3>Projeção futura</h3><p>Receita prevista para 30, 90 dias e 12 meses usando vencimentos e recorrências já registradas.</p></div><span class="badge">v3</span></div><div class="finance-category-list" id="finance-v3-projection"></div></article>
          <article class="module-card finance-card stack-sm"><div class="table-header"><div><h3>Crescimento projetado 12M</h3><p>Entradas e saídas previstas por mês para visão de expansão.</p></div></div><div class="finance-bars" id="finance-v3-monthly"></div></article>
        </section>

        <section class="module-grid finance-grid-2" id="cash-forecast-card" hidden>
          <article class="module-card finance-card stack-sm"><div class="table-header"><div><h3>Previsão de caixa</h3><p>Saldo atual + entradas previstas - saídas previstas.</p></div><span class="badge">Caixa futuro</span></div><div class="finance-category-list" id="finance-v3-cash-kpis"></div></article>
          <article class="module-card finance-card stack-sm"><div class="table-header"><div><h3>Curva de caixa 90 dias</h3><p>Semana a semana por vencimento financeiro.</p></div></div><div class="finance-bars" id="finance-v3-cash-curve"></div></article>
        </section>

        <section class="module-grid finance-grid-2" id="franchise-card" hidden>
          <article class="module-card finance-card stack-sm"><div class="table-header"><div><h3>Indicadores de franquia</h3><p>Leitura de unidade para expansão PetFunny: ticket, recorrência, ocupação e produtividade.</p></div><span class="badge">Expansão</span></div><div class="finance-category-list" id="finance-v3-franchise"></div></article>
          <article class="module-card finance-card stack-sm"><div class="table-header"><div><h3>Alertas executivos</h3><p>Insights automáticos para decisão rápida.</p></div></div><div class="finance-alert-list" id="finance-v3-alerts"></div></article>
        </section>

        <section class="module-card stack-md finance-list-card" id="executive-card" hidden>
          <div class="section-toolbar stacked-toolbar"><div class="toolbar-copy-line finance-consulta-copy"><div><h3>Dashboard executivo</h3><p>Resumo para gestão: operação, financeiro, comercial e expansão.</p></div><span class="badge">CEO Dashboard</span></div></div>
          <div class="big-number-grid finance-metrics" id="finance-v3-executive"></div>
        </section>
        <section class="module-card stack-md finance-list-card" id="transactions-card">
          <div class="section-toolbar stacked-toolbar">
            <div class="toolbar-copy-line finance-consulta-copy">
              <div>
                <h3>Consulta financeira</h3>
                <p>Busque lançamentos por vencimento, revise status, filtre por tipo e faça a baixa sem perder o contexto do tutor.</p>
              </div>
              <button class="btn" type="button" id="new-transaction-list">＋ Novo lançamento</button>
            </div>
            <div class="filter-row compact-filter-row filters-below finance-filter-row">
              <input class="input" id="filter-search" placeholder="Buscar tutor, WhatsApp ou descrição" autocomplete="off">
              <select class="select" id="filter-type"></select>
              <select class="select" id="filter-status"></select>
              <select class="select" id="filter-category"></select>
              <select class="select" id="filter-period" aria-label="Filtrar por período">
                <option value="month">Mês selecionado</option>
                <option value="last7">Últimos 7 dias</option>
                <option value="last30">Últimos 30 dias</option>
                <option value="year">Ano do mês selecionado</option>
                <option value="custom">Período por data</option>
              </select>
              <select class="select" id="filter-date-type" aria-label="Tipo de data">
                <option value="due">Data de vencimento</option>
                <option value="paid">Data de pagamento</option>
                <option value="created">Data de lançamento</option>
              </select>
              <input class="input" id="filter-month" type="month" value="${state.filters.month}" aria-label="Filtrar por mês">
              <input class="input" id="filter-start-date" type="date" value="${state.filters.startDate}" aria-label="Data inicial">
              <input class="input" id="filter-end-date" type="date" value="${state.filters.endDate}" aria-label="Data final">
            </div>
          </div>
          <div class="table-scroll custom-scroll no-inner-scroll finance-table-scroll">
            <table class="premium-table finance-records-table">
              <thead>
                <tr>
                  <th><span class="th-label">Lançamento</span><button class="th-arrow-only finance-sort" data-sort="description" type="button" title="Ordenar por lançamento"><span class="sort-arrow">↕</span></button></th>
                  <th><span class="th-label">Tutor/Pet</span><button class="th-arrow-only finance-sort" data-sort="tutorName" type="button" title="Ordenar por tutor"><span class="sort-arrow">↕</span></button></th>
                  <th><span class="th-label">Tipo</span><button class="th-arrow-only finance-sort" data-sort="type" type="button" title="Ordenar por tipo"><span class="sort-arrow">↕</span></button></th>
                  <th><span class="th-label">Categoria</span><button class="th-arrow-only finance-sort" data-sort="category" type="button" title="Ordenar por categoria"><span class="sort-arrow">↕</span></button></th>
                  <th><span class="th-label">Vencimento</span><button class="th-arrow-only finance-sort" data-sort="dueDate" type="button" title="Ordenar por vencimento"><span class="sort-arrow">↕</span></button></th>
                  <th><span class="th-label">Status</span><button class="th-arrow-only finance-sort" data-sort="status" type="button" title="Ordenar por status"><span class="sort-arrow">↕</span></button></th>
                  <th><span class="th-label">Valor</span><button class="th-arrow-only finance-sort" data-sort="amountCents" type="button" title="Ordenar por valor"><span class="sort-arrow">↕</span></button></th>
                  <th>Ações</th>
                </tr>
              </thead>
              <tbody id="finance-list"><tr><td colspan="8">Preparando lançamentos...</td></tr></tbody>
            </table>
          </div>
          <div class="infinite-loader" id="finance-loader" hidden>Carregando mais lançamentos...</div>
          <div class="infinite-sentinel" id="finance-sentinel" aria-hidden="true"></div>
        </section>

        <section class="module-card stack-md finance-list-card" id="defaulters-card" hidden>
          <div class="section-toolbar stacked-toolbar">
            <div class="toolbar-copy-line finance-consulta-copy">
              <div>
                <h3>Clientes inadimplentes</h3>
                <p>Cobranças vencidas para abordar com cuidado, clareza e mensagem amigável pelo WhatsApp.</p>
              </div>
              <span class="badge" id="defaulters-count">0 registros</span>
            </div>
          </div>
          <div class="table-scroll custom-scroll no-inner-scroll finance-table-scroll">
            <table class="premium-table finance-records-table">
              <thead>
                <tr>
                  <th><span class="th-label">Cobrança</span><button class="th-arrow-only defaulter-sort" data-sort="description" type="button"><span class="sort-arrow">↕</span></button></th>
                  <th><span class="th-label">Tutor</span><button class="th-arrow-only defaulter-sort" data-sort="tutorName" type="button"><span class="sort-arrow">↕</span></button></th>
                  <th><span class="th-label">Vencimento</span><button class="th-arrow-only defaulter-sort" data-sort="dueDate" type="button"><span class="sort-arrow">↕</span></button></th>
                  <th><span class="th-label">Valor</span><button class="th-arrow-only defaulter-sort" data-sort="amountCents" type="button"><span class="sort-arrow">↕</span></button></th>
                  <th>Ações</th>
                </tr>
              </thead>
              <tbody id="defaulters-list"><tr><td colspan="5">Preparando inadimplentes...</td></tr></tbody>
            </table>
          </div>
        </section>
      </section>

      <div class="modal-backdrop" id="finance-modal" hidden>
        <div class="premium-modal finance-modal-card" role="dialog" aria-modal="true">
          <header class="modal-header"><div><p class="eyebrow">Financeiro PetFunny</p><h2 id="modal-title">Novo lançamento</h2></div><button class="icon-btn" type="button" data-close-modal>×</button></header>
          <div class="modal-body custom-scroll"><form id="finance-form" class="form-grid form-row-gap">
            <label class="form-field"><span>Tipo</span><select class="select" name="type" required><option value="income">Entrada</option><option value="expense">Saída</option></select></label>
            <label class="form-field"><span>Status</span><select class="select" name="status"><option value="pending">Pendente</option><option value="paid">Pago</option><option value="overdue">Vencido</option><option value="canceled">Cancelado</option></select></label>
            <label class="form-field"><span>Categoria</span><select class="select" name="category" id="form-category" required></select></label>
            <label class="form-field"><span>Valor</span><input class="input" data-mask="money" name="amount" placeholder="R$ 0,00" required></label>
            <label class="form-field"><span>Vencimento</span><input class="input" type="date" name="dueDate"></label>
            <label class="form-field"><span>Tutor vinculado</span><select class="select" name="tutorId" id="form-tutor"><option value="">Sem tutor</option></select></label>
            <label class="form-field wide"><span>Descrição</span><input class="input" name="description" placeholder="Ex: Banho e tosa, pacote, fornecedor, aluguel..."></label>
          </form></div>
          <footer class="modal-footer"><button class="btn btn-secondary" type="button" data-close-modal>Cancelar</button><button class="btn" type="submit" form="finance-form">Salvar</button></footer>
        </div>
      </div>

      <div class="modal-backdrop" id="message-modal" hidden>
        <div class="premium-modal finance-modal-card small-modal" role="dialog" aria-modal="true">
          <header class="modal-header"><div><p class="eyebrow">Mensagem financeira</p><h2>Enviar mensagem</h2></div><button class="icon-btn" type="button" data-close-message>×</button></header>
          <div class="modal-body custom-scroll">
            <p class="muted-text">Revise o texto antes de abrir o WhatsApp do tutor. O envio continua manual e seguro.</p>
            <label class="form-field wide"><span>Mensagem pronta</span><textarea class="textarea" id="finance-message-text" rows="7"></textarea></label>
          </div>
          <footer class="modal-footer"><button class="btn btn-secondary" type="button" data-close-message>Cancelar</button><a class="btn" id="finance-message-whatsapp" target="_blank" rel="noopener">Abrir WhatsApp</a></footer>
        </div>
      </div>

      <div class="modal-backdrop" id="pay-modal" hidden>
        <div class="premium-modal finance-modal-card small-modal" role="dialog" aria-modal="true">
          <header class="modal-header"><div><p class="eyebrow">Baixa financeira</p><h2>Registrar pagamento</h2></div><button class="icon-btn" type="button" data-close-pay>×</button></header>
          <div class="modal-body custom-scroll"><form id="pay-form" class="form-grid form-row-gap">
            <input type="hidden" name="id">
            <label class="form-field"><span>Forma de pagamento</span><select class="select" name="paymentMethodId" id="pay-method"></select></label>
            <label class="form-field"><span>Valor recebido</span><input class="input" data-mask="money" name="amount" required></label>
            <label class="form-field wide"><span>Observações</span><textarea class="textarea" name="notes" rows="4" placeholder="Ex: Pix recebido no caixa"></textarea></label>
          </form></div>
          <footer class="modal-footer"><button class="btn btn-secondary" type="button" data-close-pay>Cancelar</button><button class="btn" type="submit" form="pay-form">Baixar pagamento</button></footer>
        </div>
      </div>
    `;
  }

  buildShell({ active: 'Financeiro', eyebrow: 'PetFunny OS · Financeiro', title: 'Financeiro', subtitle: 'Caixa e recebimentos reais, sem depender de integração externa.', content: layout() });

  function optionList(items, selected = 'all', allLabel = 'Todos') {
    return `<option value="all">${allLabel}</option>` + items.map((v) => `<option value="${esc(v)}" ${v === selected ? 'selected' : ''}>${esc(statusLabel[v] || typeLabel[v] || v)}</option>`).join('');
  }

  function valueFor(item, key) {
    if (key === 'dueDate') return item.dueDate ? new Date(item.dueDate).getTime() : 0;
    if (key === 'amountCents') return Number(item.amountCents || 0);
    return String(item[key] || '').toLowerCase();
  }

  function sortItems(items, key, dir) {
    return [...items].sort((a, b) => {
      const av = valueFor(a, key); const bv = valueFor(b, key);
      if (av > bv) return dir === 'asc' ? 1 : -1;
      if (av < bv) return dir === 'asc' ? -1 : 1;
      return 0;
    });
  }

  function updateSortArrows() {
    document.querySelectorAll('.finance-sort').forEach((btn) => {
      btn.querySelector('.sort-arrow').textContent = btn.dataset.sort === state.sortBy ? (state.sortDir === 'asc' ? '↑' : '↓') : '↕';
    });
    document.querySelectorAll('.defaulter-sort').forEach((btn) => {
      btn.querySelector('.sort-arrow').textContent = btn.dataset.sort === state.defaulterSortBy ? (state.defaulterSortDir === 'asc' ? '↑' : '↓') : '↕';
    });
  }

  async function loadOptions() {
    state.options = await api.get('/financeiro/options');
    $('#filter-type').innerHTML = optionList(state.options.types, state.filters.type, 'Todos os tipos');
    $('#filter-status').innerHTML = optionList(state.options.statuses, state.filters.status, 'Todos os status');
    $('#filter-category').innerHTML = optionList(state.options.categories, state.filters.category, 'Todas categorias');
    $('#form-category').innerHTML = state.options.categories.map((c) => `<option value="${esc(c)}">${esc(c)}</option>`).join('');
    $('#form-tutor').innerHTML = '<option value="">Sem tutor</option>' + state.options.tutors.map((t) => `<option value="${esc(t.id)}">${esc(t.name)} · ${esc(t.whatsapp || '')}</option>`).join('');
    $('#pay-method').innerHTML = state.options.paymentMethods.map((m) => `<option value="${esc(m.id)}">${esc(m.name)}</option>`).join('');
  }

  function buildPeriodParams() {
    const params = new URLSearchParams({
      period: state.filters.period || 'month',
      month: state.filters.month || currentMonth
    });
    if (state.filters.period === 'custom') {
      params.set('startDate', state.filters.startDate || firstDayOfMonth);
      params.set('endDate', state.filters.endDate || todayIso);
    }
    params.set('dateType', state.filters.dateType || 'due');
    return params;
  }

  function buildTransactionParams() {
    const params = buildPeriodParams();
    params.set('page', state.page);
    params.set('limit', state.limit);
    params.set('search', state.filters.search || '');
    params.set('type', state.filters.type || 'all');
    params.set('status', state.filters.status || 'all');
    params.set('category', state.filters.category || 'all');
    params.set('dateType', state.filters.dateType || 'due');
    return params;
  }

  function applyPeriodControlsVisibility() {
    const isCustom = state.filters.period === 'custom';
    $('#filter-month').hidden = ['last7','last30','custom'].includes(state.filters.period);
    $('#filter-start-date').hidden = !isCustom;
    $('#filter-end-date').hidden = !isCustom;
  }

  async function loadSummary() {
    const params = buildPeriodParams();
    state.summary = await api.get(`/financeiro/summary?${params}`);
    renderSummary();
  }

  async function loadFinanceV2() {
    const params = buildPeriodParams();
    state.financeV2 = await api.get(`/financeiro/360-v2?${params}`);
    renderFinanceV2();
  }

  async function loadFinanceV3() {
    const params = buildPeriodParams();
    state.financeV3 = await api.get(`/financeiro/360-v3?${params}`);
    renderFinanceV3();
  }

  function v3Metric(label, value, hint, tone = '') {
    return `<div class="finance-v2-metric ${tone}"><span><strong>${esc(label)}</strong><small>${esc(hint || '')}</small></span><b>${value}</b></div>`;
  }

  function renderFinanceV3() {
    const v3 = state.financeV3 || {};
    const projection = v3.projection || {};
    const cash = v3.cashForecast || {};
    const franchise = v3.franchiseIndicators || {};
    const executive = v3.executive || {};
    const projectionEl = $('#finance-v3-projection');
    if (projectionEl) projectionEl.innerHTML = [
      v3Metric('Receita prevista 30 dias', money(projection.revenue_30_cents), `${projection.income_30_count || 0} recebimento(s)`),
      v3Metric('Receita prevista 90 dias', money(projection.revenue_90_cents), `${projection.income_90_count || 0} recebimento(s)`),
      v3Metric('Receita prevista 12 meses', money(projection.revenue_12m_cents), `${projection.income_12m_count || 0} recebimento(s)`),
      v3Metric('Saídas previstas 30 dias', money(projection.expense_30_cents), 'Contas a pagar por vencimento', 'finance-v2-warning')
    ].join('');

    const monthRows = projection.monthly || [];
    const maxMonth = Math.max(1, ...monthRows.flatMap((d) => [Number(d.income_cents || 0), Number(d.expense_cents || 0)]));
    const monthlyEl = $('#finance-v3-monthly');
    if (monthlyEl) monthlyEl.innerHTML = monthRows.length ? monthRows.map((d) => `<div class="finance-bar-row"><span>${esc(d.label)}</span><div class="finance-bar-track"><i style="width:${Math.max(4, (Number(d.income_cents || 0)/maxMonth)*100)}%"></i><b style="width:${Math.max(4, (Number(d.expense_cents || 0)/maxMonth)*100)}%"></b></div><small>${money(d.income_cents)} / ${money(d.expense_cents)}</small></div>`).join('') : '<p class="muted-text">Sem projeção mensal.</p>';

    const cashKpiEl = $('#finance-v3-cash-kpis');
    if (cashKpiEl) cashKpiEl.innerHTML = [
      v3Metric('Saldo atual estimado', money(cash.current_cents), 'Entradas pagas menos saídas pagas'),
      v3Metric('Saldo projetado 30 dias', money(cash.projected_30_cents), 'Saldo atual + entradas previstas - saídas previstas', Number(cash.projected_30_cents || 0) < 0 ? 'finance-v2-danger' : 'finance-v2-ok'),
      v3Metric('Entradas abertas', money(cash.realized?.open_income_cents), 'A receber nos próximos 30 dias'),
      v3Metric('Saídas abertas', money(cash.realized?.open_expense_cents), 'A pagar nos próximos 30 dias', 'finance-v2-warning')
    ].join('');

    const curve = cash.curve || [];
    const maxCurve = Math.max(1, ...curve.flatMap((d) => [Number(d.income_cents || 0), Number(d.expense_cents || 0)]));
    const curveEl = $('#finance-v3-cash-curve');
    if (curveEl) curveEl.innerHTML = curve.length ? curve.map((d) => `<div class="finance-bar-row"><span>${esc(d.label)}</span><div class="finance-bar-track"><i style="width:${Math.max(4, (Number(d.income_cents || 0)/maxCurve)*100)}%"></i><b style="width:${Math.max(4, (Number(d.expense_cents || 0)/maxCurve)*100)}%"></b></div><small>${money(d.income_cents)} / ${money(d.expense_cents)}</small></div>`).join('') : '<p class="muted-text">Sem curva de caixa.</p>';

    const franchiseEl = $('#finance-v3-franchise');
    if (franchiseEl) franchiseEl.innerHTML = [
      v3Metric('Ticket médio', money(franchise.ticketAverageCents), 'Receita / agendamentos'),
      v3Metric('Receita por pet', money(franchise.revenuePerPetCents), 'Receita / pets atendidos'),
      v3Metric('Receita por colaborador', money(franchise.revenuePerCollaboratorCents), 'Produtividade operacional'),
      v3Metric('Ocupação da agenda', `${franchise.agendaOccupancyPercent || 0}%`, 'Estimativa de capacidade mensal'),
      v3Metric('Pacotes ativos', franchise.activePackages || 0, `${money(franchise.activePackagesValueCents)} em valor ativo`),
      v3Metric('Recorrência', `${franchise.recurrencePercent || 0}%`, 'Pacotes ativos sobre base movimentada'),
      v3Metric('Churn operacional', `${franchise.churnPercent || 0}%`, 'Cancelamentos sobre concluídos/cancelados'),
      v3Metric('LTV estimado', money(franchise.ltvEstimatedCents), 'Ticket médio x 6 ciclos')
    ].join('');

    const alertEl = $('#finance-v3-alerts');
    if (alertEl) alertEl.innerHTML = (v3.alerts || []).length ? (v3.alerts || []).map((a) => `<div class="finance-alert-item ${esc(a.tone || 'neutral')}"><strong>${esc(a.title)}</strong><span>${esc(a.message)}</span></div>`).join('') : '<p class="muted-text">Sem alertas críticos para este período.</p>';

    const executiveEl = $('#finance-v3-executive');
    if (executiveEl) executiveEl.innerHTML = [
      ['Receita mês', money(executive.revenueMonthCents), 'Operação'],
      ['Lucro mês', money(executive.profitMonthCents), 'Financeiro'],
      ['Meta mês', `${executive.targetProgressPercent || 0}%`, `${money(executive.targetMonthCents)} de meta`],
      ['Agenda ocupada', `${franchise.agendaOccupancyPercent || 0}%`, 'Operação'],
      ['Pacotes ativos', franchise.activePackages || 0, 'Comercial'],
      ['Clientes recorrentes', `${franchise.recurrencePercent || 0}%`, 'Comercial'],
      ['Inadimplência', money(executive.overdueCents), `${executive.overdueCount || 0} pendência(s)`],
      ['Receita projetada 12M', money(executive.projected12mCents), 'Expansão']
    ].map(([label, value, hint]) => `<article class="big-number-card"><span>${label}</span><strong>${value}</strong><small>${hint}</small></article>`).join('');
  }

        <td><strong>${money(item.gross_cents)}</strong></td>
        <td><span class="status-pill status-info">${Number(item.avg_commission_percent || 0)}%</span></td>

      </tr>

        <td>${dateBR(item.due_date)}</td>

    const serviceEl = $('#finance-service-revenue');
    if (serviceEl) serviceEl.innerHTML = services.length ? services.map((item) => `
      <div class="finance-v2-metric"><span><strong>${esc(item.service_name)}</strong><small>${esc(item.category_name || 'Sem categoria')} · ${Number(item.quantity || 0)} atendimento(s) · Ticket ${money(item.ticket_cents)}</small></span><b>${money(item.revenue_cents)}</b></div>
    `).join('') : '<p class="muted-text">Sem receita por serviço no período.</p>';

    const marginEl = $('#finance-service-margin');
    if (marginEl) marginEl.innerHTML = margins.length ? margins.map((item) => {
      const cls = Number(item.margin_percent || 0) < 40 ? 'finance-v2-warning' : 'finance-v2-ok';
      return `<div class="finance-v2-metric ${cls}"><span><strong>${esc(item.service_name)}</strong><small>Custo estimado ${money(item.cost_cents)} · margem ${money(item.margin_cents)}</small></span><b>${Number(item.margin_percent || 0)}%</b></div>`;
    }).join('') : '<p class="muted-text">Sem margem calculada no período.</p>';

    const alertBox = $('#finance-alerts');
    if (alertBox && v2Alerts.length) {
      const current = alertBox.innerHTML || '';
      alertBox.innerHTML = current + v2Alerts.map((a) => `<div class="finance-alert-item ${esc(a.tone || 'neutral')}"><strong>${esc(a.title)}</strong><span>${esc(a.message)}</span></div>`).join('');
    }
  }

  function openFinanceExport(format) {
    const params = buildPeriodParams();
    const path = format === 'pdf' ? '/api/financeiro/export.pdf' : '/api/financeiro/export.csv';
    window.open(`${path}?${params}`, '_blank', 'noopener');
  }

  async function loadTransactions({ reset = true } = {}) {
    if (state.loadingMore) return;
    state.loadingMore = true;
    $('#finance-loader').hidden = false;
    if (reset) { state.page = 1; state.transactions = []; state.done = false; }
    const params = buildTransactionParams();
    try {
      const payload = await api.get(`/financeiro/transactions?${params}`);
      const nextItems = payload.items || [];
      state.transactions = reset ? nextItems : [...state.transactions, ...nextItems];
      state.total = payload.total || state.transactions.length;
      state.done = state.transactions.length >= state.total || nextItems.length === 0;
      renderTransactions();
    } finally {
      state.loadingMore = false;
      $('#finance-loader').hidden = true;
      applyFinanceTab();
    }
  }

  async function loadDefaulters() {
    const payload = await api.get('/financeiro/inadimplentes');
    state.defaulters = payload.items || [];
    $('#defaulters-count').textContent = `${state.defaulters.length} registro(s) · ${money(payload.totalCents || 0)}`;
    renderDefaulters();
  }

  function renderSummary() {
    const s = state.summary?.summary || {};
    const incomeDue = Number(s.income_due_period_cents || 0);
    const expenseDue = Number(s.expense_due_period_cents || 0);
    $('#finance-metrics').innerHTML = [
      ['Receitas', money(incomeDue), 'Previstas por vencimento'],
      ['Despesas', money(expenseDue), 'Contas por vencimento'],
      ['Lucro estimado', money(s.estimated_profit_cents), 'Receitas menos despesas'],
      ['Em aberto', money((s.pending_income_cents || 0) + (s.pending_expense_cents || 0)), `${(s.pending_income_count || 0) + (s.pending_expense_count || 0)} pendência(s)`],
      ['Em atraso', money(s.overdue_income_cents), `${s.overdue_income_count || 0} cobrança(s)`],
      ['Pago', `${s.payment_rate_percent || 0}%`, 'Taxa de pagamento do período']
    ].map(([label, value, hint]) => `<article class="big-number-card"><span>${label}</span><strong>${value}</strong><small>${hint}</small></article>`).join('');

    const max = Math.max(1, ...((state.summary?.flow || []).flatMap((d) => [d.income_cents, d.expense_cents, d.received_cents, d.projected_cents])));
    $('#finance-flow').innerHTML = (state.summary?.flow || []).map((d) => `
      <div class="finance-bar-row"><span>${esc(d.label)}</span><div class="finance-bar-track"><i title="Entradas" style="width:${Math.max(4, (d.income_cents / max) * 100)}%"></i><b title="Saídas" style="width:${Math.max(4, (d.expense_cents / max) * 100)}%"></b></div><small>${money(d.income_cents)} / ${money(d.expense_cents)}</small></div>
    `).join('') || '<p>Sem movimentação recente.</p>';

    $('#finance-categories').innerHTML = (state.summary?.byCategory || []).map((c) => `
      <div class="finance-category-pill ${esc(c.type)}"><strong>${esc(c.category)}</strong><span>${esc(typeLabel[c.type] || c.type)} · ${c.count}</span><b>${money(c.total_cents)}</b></div>
    `).join('') || '<p>Nenhuma categoria encontrada.</p>';

    $('#finance-receipts-today').innerHTML = (state.summary?.receiptsToday || []).map((r) => `<div class="finance-mini-item"><span>${esc(r.method)}</span><strong>${money(r.total_cents)}</strong><small>${r.count} recebimento(s)</small></div>`).join('') || '<p class="muted-text">Nenhum recebimento registrado hoje.</p>';
    $('#finance-upcoming').innerHTML = (state.summary?.upcoming || []).map((item) => `<div class="finance-mini-item"><span>${dateBR(item.dueDate)} · ${esc(item.description || 'Lançamento')}</span><strong>${money(item.amountCents)}</strong><small>${esc(item.tutorName || item.category || 'Sem tutor')}</small></div>`).join('') || '<p class="muted-text">Nenhum vencimento nos próximos 7 dias.</p>';
    $('#finance-alerts').innerHTML = (state.summary?.alerts || []).map((a) => `<div class="finance-alert-item ${esc(a.tone || 'neutral')}"><strong>${esc(a.title)}</strong><span>${esc(a.message)}</span></div>`).join('') || '<p class="muted-text">Nenhum alerta crítico no momento.</p>';
  }

  function renderTransactions() {
    const sorted = sortItems(state.transactions, state.sortBy, state.sortDir);
    $('#finance-list').innerHTML = sorted.length ? sorted.map((item) => `
      <tr class="finance-row ${esc(item.type)} ${esc(item.status)}">
        <td><strong>${esc(item.description || 'Lançamento')}</strong><small>${esc(item.packageName || item.paymentMethodName || 'Movimento avulso')}</small></td>
        <td><strong>${esc(item.tutorName || 'Sem tutor')}</strong><small>${esc(item.petName || item.tutorWhatsapp || '—')}</small></td>
        <td><span class="status-pill ${item.type === 'income' ? 'status-success' : 'status-warning'}">${esc(typeLabel[item.type] || item.type)}</span></td>
        <td>${esc(item.category || 'outros')}</td>
        <td>${dateBR(item.dueDate)}</td>
        <td><span class="status-pill status-${statusTone[item.status] || 'neutral'}">${esc(statusLabel[item.status] || item.status)}</span></td>
        <td><strong class="finance-value ${item.type === 'expense' ? 'negative' : 'positive'}">${item.type === 'expense' ? '-' : '+'}${money(item.amountCents)}</strong></td>

  function renderDefaulters() {
    const sorted = sortItems(state.defaulters, state.defaulterSortBy, state.defaulterSortDir);
    $('#defaulters-list').innerHTML = sorted.length ? sorted.map((item) => `
      <tr class="finance-row overdue">
        <td><strong>${esc(item.description || 'Cobrança vencida')}</strong><small>${esc(item.packageName || 'Acompanhamento financeiro')}</small></td>
        <td><strong>${esc(item.tutorName || 'Cliente')}</strong><small>${esc(item.tutorWhatsapp || 'WhatsApp não informado')}</small></td>
        <td>${dateBR(item.dueDate)}</td>
        <td><strong class="finance-value positive">${money(item.amountCents)}</strong></td>
        <td><div class="table-actions finance-kebab-actions"><button class="card-kebab finance-kebab" type="button" data-finance-menu="${esc(item.id)}" aria-label="Ações da cobrança">⋯</button><div class="finance-action-menu" data-finance-menu-panel="${esc(item.id)}"><button type="button" data-finance-edit="${esc(item.id)}">Editar lançamento</button><button type="button" data-finance-message="${esc(item.id)}">Enviar mensagem</button><button type="button" data-finance-pay="${esc(item.id)}" data-amount="${esc(item.amountCents)}">Dar baixa</button><button type="button" class="danger-menu-item" data-finance-delete="${esc(item.id)}">Excluir lançamento</button></div></div></td>

  function applyFinanceTab() {
    document.querySelectorAll('[data-finance-tab]').forEach(btn => btn.classList.toggle('active', btn.dataset.financeTab === state.activeTab));
    $('#transactions-card').hidden = state.activeTab !== 'lancamentos';
    $('#defaulters-card').hidden = state.activeTab !== 'inadimplentes';
    $('#commissions-card').hidden = state.activeTab !== 'comissoes';
    $('#reconciliation-card').hidden = state.activeTab !== 'conciliacao';
    $('#services-card').hidden = state.activeTab !== 'servicos';
    $('#projection-card').hidden = state.activeTab !== 'projecao';
    $('#cash-forecast-card').hidden = state.activeTab !== 'caixa-futuro';
    $('#franchise-card').hidden = state.activeTab !== 'indicadores';
    $('#executive-card').hidden = state.activeTab !== 'executivo';
  }

  async function refreshAll() {
    showLoading('Carregando financeiro...', 'Consolidando caixa, pendências e baixas do PetFunny.');
    try {
      await loadOptions();
      await Promise.all([loadSummary(), loadFinanceV2(), loadFinanceV3(), loadTransactions({ reset: true }), loadDefaulters()]);
      window.dispatchEvent(new Event('petfunny:page-ready'));
    } catch (error) { showToast(error.message || 'Erro ao carregar financeiro.', 'error'); }
    finally { hideLoading(); }
  }

  function setFinanceFormValue(name, value) {
    const field = $('#finance-form')?.elements?.[name];
    if (field) field.value = value ?? '';
  }
  function openTransactionModal(item = null) {
    const form = $('#finance-form');
    form.reset();
    state.editingTransactionId = item?.id || null;
    $('#modal-title').textContent = state.editingTransactionId ? 'Editar lançamento' : 'Novo lançamento';
    if (item) {
      setFinanceFormValue('type', item.type || 'income');
      setFinanceFormValue('status', item.status || 'pending');
      setFinanceFormValue('category', item.category || 'outros');
      setFinanceFormValue('amount', money(item.amountCents || 0));
      setFinanceFormValue('dueDate', item.dueDate ? String(item.dueDate).slice(0, 10) : '');
      setFinanceFormValue('tutorId', item.tutorId || '');
      setFinanceFormValue('description', item.description || '');
    }
    $('#finance-modal').hidden = false;
    $('#finance-modal').classList.add('is-open');
    setupPremiumInteractions($('#finance-modal'));
  }
  function closeTransactionModal() { state.editingTransactionId = null; $('#finance-modal').hidden = true; $('#finance-modal').classList.remove('is-open'); }
  function findFinanceItem(id) { return [...state.transactions, ...state.defaulters].find((item) => String(item.id) === String(id)) || {}; }
  function buildFinanceMessage(item = {}) {
    return `Oi, ${item.tutorName || 'tudo bem'}! Aqui é do PetFunny - Banho e Tosa.\n\nPassando para lembrar sobre ${item.description || 'um lançamento financeiro'} no valor de ${money(item.amountCents)}${item.dueDate ? `, com vencimento em ${dateBR(item.dueDate)}` : ''}.\n\nQualquer dúvida, pode me chamar por aqui. 🐾`;
  }
  function openMessageModal(id) {
    const item = findFinanceItem(id);
    const text = buildFinanceMessage(item);
    $('#finance-message-text').value = text;
    const phone = String(item.tutorWhatsapp || '').replace(/\D/g, '');
    const normalized = phone ? (phone.startsWith('55') ? phone : `55${phone}`) : '';
    $('#finance-message-whatsapp').href = normalized ? `https://wa.me/${normalized}?text=${encodeURIComponent(text)}` : '#';
    $('#message-modal').hidden = false; $('#message-modal').classList.add('is-open'); setupPremiumInteractions($('#message-modal'));
  }
  function closeMessageModal() { $('#message-modal').hidden = true; $('#message-modal').classList.remove('is-open'); }
  function openPayModal(id, amountCents) { $('#pay-form').reset(); $('#pay-form').elements.id.value = id; $('#pay-form').elements.amount.value = money(amountCents); $('#pay-modal').hidden = false; $('#pay-modal').classList.add('is-open'); setupPremiumInteractions($('#pay-modal')); }
  function closePayModal() { $('#pay-modal').hidden = true; $('#pay-modal').classList.remove('is-open'); }
  function closeFinanceMenus() { document.querySelectorAll('.finance-action-menu.is-open').forEach((menu) => menu.classList.remove('is-open')); }
  async function deleteTransaction(id) {
    const item = findFinanceItem(id);
    const label = item?.description || 'este lançamento';
    if (!confirm(`Excluir/cancelar ${label}? Esta ação remove o lançamento da consulta financeira sem apagar o histórico técnico.`)) return;
    try {
      showLoading('Excluindo lançamento...', 'Atualizando financeiro e inadimplentes.');
      await api.delete(`/financeiro/transactions/${id}`);
      showToast('Lançamento excluído com sucesso.');
      await Promise.all([loadSummary(), loadFinanceV2(), loadFinanceV3(), loadTransactions({ reset: true }), loadDefaulters()]);
    } catch (error) { showToast(error.message || 'Erro ao excluir lançamento.', 'error'); }
    finally { hideLoading(); }
  }
  
  function setupFinanceActionMenus() {
    document.querySelectorAll('[data-finance-menu]').forEach((button) => button.onclick = (event) => { event.stopPropagation(); const id = button.dataset.financeMenu; const panel = document.querySelector(`[data-finance-menu-panel="${CSS.escape(id)}"]`); const wasOpen = panel?.classList.contains('is-open'); closeFinanceMenus(); if (panel && !wasOpen) panel.classList.add('is-open'); });
    document.querySelectorAll('[data-finance-pay]').forEach((button) => button.onclick = () => { closeFinanceMenus(); openPayModal(button.dataset.financePay, button.dataset.amount); });
    document.querySelectorAll('[data-finance-edit]').forEach((button) => button.onclick = () => { closeFinanceMenus(); const item = findFinanceItem(button.dataset.financeEdit); if (!item?.id) return showToast('Lançamento não encontrado para edição.', 'error'); openTransactionModal(item); });
    document.querySelectorAll('[data-finance-delete]').forEach((button) => button.onclick = async () => { closeFinanceMenus(); await deleteTransaction(button.dataset.financeDelete); });
    document.querySelectorAll('[data-finance-message]').forEach((button) => button.onclick = () => { closeFinanceMenus(); openMessageModal(button.dataset.financeMessage); });
  }

  $('#new-transaction').addEventListener('click', () => openTransactionModal());
  $('#new-transaction-list')?.addEventListener('click', () => openTransactionModal());
  $('#refresh-finance').addEventListener('click', refreshAll);
  $('#export-finance-csv')?.addEventListener('click', () => openFinanceExport('csv'));
  $('#export-finance-pdf')?.addEventListener('click', () => openFinanceExport('pdf'));
  document.querySelectorAll('[data-close-modal]').forEach((b) => b.addEventListener('click', closeTransactionModal));
  document.querySelectorAll('[data-close-pay]').forEach((b) => b.addEventListener('click', closePayModal));
  document.querySelectorAll('[data-close-message]').forEach((b) => b.addEventListener('click', closeMessageModal));
  document.addEventListener('click', (event) => { if (!event.target.closest('.finance-kebab-actions')) closeFinanceMenus(); });
  $('#finance-message-text')?.addEventListener('input', () => { const href = $('#finance-message-whatsapp').href; const phone = href.includes('wa.me/') ? href.split('wa.me/')[1].split('?')[0] : ''; if (phone) $('#finance-message-whatsapp').href = `https://wa.me/${phone}?text=${encodeURIComponent($('#finance-message-text').value)}`; });
  document.querySelectorAll('[data-finance-tab]').forEach((button) => button.addEventListener('click', async () => {
    state.activeTab = button.dataset.financeTab;
    const url = new URL(window.location.href);
    if (state.activeTab && state.activeTab !== 'lancamentos') url.searchParams.set('tab', state.activeTab); else url.searchParams.delete('tab');
    window.history.replaceState({}, '', url);
    applyFinanceTab();
    if (state.activeTab === 'inadimplentes') await loadDefaulters();
    if (['comissoes','conciliacao','servicos'].includes(state.activeTab) && !state.financeV2) await loadFinanceV2();
    if (['projecao','caixa-futuro','indicadores','executivo'].includes(state.activeTab) && !state.financeV3) await loadFinanceV3();
  }));
  document.querySelectorAll('[data-finance-filter-shortcut]').forEach((button) => button.addEventListener('click', async () => {
    const shortcut = button.dataset.financeFilterShortcut;
    state.activeTab = 'lancamentos';
    if (shortcut === 'income') { state.filters.type = 'income'; state.filters.status = 'all'; }
    if (shortcut === 'expense') { state.filters.type = 'expense'; state.filters.status = 'all'; }
    if (shortcut === 'pending') { state.filters.status = 'pending'; state.filters.type = 'all'; }
    $('#filter-type').value = state.filters.type;
    $('#filter-status').value = state.filters.status;
    applyFinanceTab();
    await loadTransactions({ reset: true });
  }));
  document.querySelectorAll('.finance-sort').forEach((btn) => btn.addEventListener('click', () => { const key = btn.dataset.sort; state.sortDir = state.sortBy === key && state.sortDir === 'asc' ? 'desc' : 'asc'; state.sortBy = key; renderTransactions(); }));
  document.querySelectorAll('.defaulter-sort').forEach((btn) => btn.addEventListener('click', () => { const key = btn.dataset.sort; state.defaulterSortDir = state.defaulterSortBy === key && state.defaulterSortDir === 'asc' ? 'desc' : 'asc'; state.defaulterSortBy = key; renderDefaulters(); }));
  ['filter-search','filter-type','filter-status','filter-category','filter-period','filter-date-type','filter-month','filter-start-date','filter-end-date'].forEach((id) => {
    $(`#${id}`).addEventListener('input', async () => {
      state.filters = {
        search: $('#filter-search').value,
        type: $('#filter-type').value,
        status: $('#filter-status').value,
        category: $('#filter-category').value,
        period: $('#filter-period').value || 'month',
        month: $('#filter-month').value || currentMonth,
        startDate: $('#filter-start-date').value || firstDayOfMonth,
        endDate: $('#filter-end-date').value || todayIso,
        dateType: $('#filter-date-type').value || 'due'
      };
      applyPeriodControlsVisibility();
      await Promise.all([loadSummary(), loadFinanceV2(), loadFinanceV3(), loadTransactions({ reset: true })]);
    });
  });

  const observer = new IntersectionObserver(async (entries) => {
    const entry = entries[0];
    if (!entry?.isIntersecting || state.activeTab !== 'lancamentos' || state.done || state.loadingMore) return;
    state.page += 1;
    await loadTransactions({ reset: false });
  }, { root: null, rootMargin: '420px 0px', threshold: 0.01 });
  observer.observe($('#finance-sentinel'));

  $('#finance-form').addEventListener('submit', async (event) => {
    event.preventDefault();
    const data = Object.fromEntries(new FormData(event.currentTarget).entries());
    try {
      showLoading(state.editingTransactionId ? 'Atualizando lançamento...' : 'Salvando lançamento...', 'Atualizando o financeiro.');
      if (state.editingTransactionId) {
        await api.put(`/financeiro/transactions/${state.editingTransactionId}`, data);
        showToast('Lançamento atualizado com sucesso.');
      } else {
        await api.post('/financeiro/transactions', data);
        showToast('Lançamento criado com sucesso.');
      }
      closeTransactionModal();
      await Promise.all([loadSummary(), loadFinanceV2(), loadFinanceV3(), loadTransactions({ reset: true }), loadDefaulters()]);
    }
    catch (error) { showToast(error.message || 'Erro ao salvar lançamento.', 'error'); }
    finally { hideLoading(); }
  });

  $('#pay-form').addEventListener('submit', async (event) => {
    event.preventDefault();
    const data = Object.fromEntries(new FormData(event.currentTarget).entries());
    try { showLoading('Baixando pagamento...', 'Registrando pagamento no caixa.'); await api.patch(`/financeiro/transactions/${data.id}/pay`, data); closePayModal(); showToast('Pagamento baixado com sucesso.'); await Promise.all([loadSummary(), loadFinanceV2(), loadFinanceV3(), loadTransactions({ reset: true }), loadDefaulters()]); }
    catch (error) { showToast(error.message || 'Erro ao baixar pagamento.', 'error'); }
    finally { hideLoading(); }
  });

  applyPeriodControlsVisibility();
  await refreshAll();
</script>
</body>
</html>
