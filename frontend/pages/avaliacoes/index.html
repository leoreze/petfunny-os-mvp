<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Avaliações · PetFunny OS</title>
  <link rel="icon" type="image/png" sizes="64x64" href="/assets/img/favicon-petfunny.png">
  <link rel="manifest" href="/admin-manifest.webmanifest">
  <meta name="theme-color" content="#01ADB7">
  <link rel="stylesheet" href="/assets/css/app.css">
</head>
<body>
<script type="module">
  import { api } from '/assets/js/api.js';
  import { buildShell, bigNumberGrid, setupPremiumInteractions } from '/assets/js/shell.js';
  import { finishPageLoading, showLoading, hideLoading } from '/assets/js/loading.js';
  import { toast } from '/assets/js/toast.js';

  document.body.classList.add('service-reviews-page');
  const esc = (value = '') => String(value ?? '').replace(/[&<>"']/g, (m) => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[m]));
  const dateTime = (value) => { if (!value) return '—'; const d = new Date(value); return Number.isNaN(d.getTime()) ? '—' : d.toLocaleString('pt-BR', { dateStyle:'short', timeStyle:'short' }); };
  const onlyDigits = (value = '') => String(value || '').replace(/\D/g, '');
  const ratingEmoji = (rating) => ({1:'😞',2:'😕',3:'😐',4:'🙂',5:'😍'}[Number(rating)] || '⏳');
  const ratingClass = (rating) => Number(rating) >= 5 ? 'ok' : Number(rating) >= 4 ? 'success' : Number(rating) >= 3 ? 'warning' : Number(rating) >= 1 ? 'danger' : 'muted-pill';

  const state = { items: [], metrics: {}, status: 'all', search: '', sortBy: 'startsAt', sortDir: 'desc' };

  buildShell({
    active: 'Avaliações',
    eyebrow: 'Pós-serviço',
    title: 'Avaliações do Atendimento',
    subtitle: 'Notas enviadas pelos tutores após atendimentos finalizados e links pendentes de avaliação.',
    content: `
      <section class="hero-panel stack-lg service-reviews-hero">
        <div class="page-heading-row between">
          <div><p class="eyebrow">Feedback real</p><h1>Avaliações do Atendimento</h1><p>Acompanhe satisfação, notas pendentes e histórico de avaliações dos serviços PetFunny.</p></div>
          <a class="btn btn-secondary" href="/admin/agenda">📅 Ver agenda</a>
        </div>
        <div id="review-metrics">${bigNumberGrid([['Avaliações','--','links gerados'],['Respondidas','--','notas recebidas'],['Média','--','nota geral'],['Pendentes','--','aguardando tutor']])}</div>
      </section>
      <section class="module-card stack-md service-reviews-list-card">
        <div class="section-toolbar">
          <div><h3>Lista de avaliações</h3><p>Quando um atendimento é finalizado, o link de avaliação é gerado para envio no WhatsApp.</p></div>
          <div class="filter-row compact-filter-row"><input class="input" id="search" placeholder="Buscar tutor, pet ou WhatsApp"><select class="select" id="status"><option value="all">Todas</option><option value="submitted">Respondidas</option><option value="pending">Pendentes</option></select><button class="btn btn-secondary" id="reload" type="button">Atualizar</button></div>
        </div>
        <div class="table-scroll no-inner-scroll">
          <table class="premium-table service-reviews-table sortable-table">
            <thead><tr>
              <th><button class="th-sort review-sort" type="button" data-sort="tutorPet">Tutor / Pet</button></th>
              <th><button class="th-sort review-sort" type="button" data-sort="services">Serviço</button></th>
              <th><button class="th-sort review-sort" type="button" data-sort="startsAt">Data</button></th>
              <th><button class="th-sort review-sort" type="button" data-sort="rating">Nota</button></th>
              <th><button class="th-sort review-sort" type="button" data-sort="appointmentStatusName">Status</button></th>
              <th>Ações</th>
            </tr></thead>
            <tbody id="rows"><tr><td colspan="6">Carregando avaliações...</td></tr></tbody>
          </table>
        </div>
      </section>`
  });

  const rows = document.getElementById('rows');
  const metrics = document.getElementById('review-metrics');
  const search = document.getElementById('search');
  const status = document.getElementById('status');

  function renderMetrics() {
    const m = state.metrics || {};
    const avg = Number(m.average_rating || m.averageRating || 0);
    metrics.innerHTML = bigNumberGrid([
      ['Avaliações', Number(m.total || 0), 'links gerados'],
      ['Respondidas', Number(m.submitted || 0), 'notas recebidas'],
      ['Média', avg ? avg.toFixed(1).replace('.', ',') : '—', 'nota geral'],
      ['Pendentes', Number(m.pending || 0), 'aguardando tutor']
    ]);
  }

  function whatsappReviewMessage(item = {}) {
    return `Oi, ${item.tutorName || 'tudo bem'}! Tudo bem? Aqui é do PetFunny 🐶✨\n\nO atendimento do ${item.petName || 'seu pet'} foi finalizado e sua opinião ajuda muito a gente a melhorar cada banho, tosa e cuidado.\n\nPode avaliar em 10 segundos por aqui?\n${item.reviewUrl}\n\nObrigado pela confiança!`;
  }

  function normalizeStatusLabel(value = '') {
    const text = String(value || '').trim();
    if (!text) return 'Finalizado';
    return text.charAt(0).toUpperCase() + text.slice(1).replace(/_/g, ' ');
  }

  function sortValue(item = {}, key = '') {
    if (key === 'tutorPet') return `${item.tutorName || ''} ${item.petName || ''}`.toLowerCase();
    if (key === 'services') return String(item.services || '').toLowerCase();
    if (key === 'startsAt') return item.startsAt ? new Date(item.startsAt).getTime() || 0 : 0;
    if (key === 'rating') return Number(item.rating || 0);
    if (key === 'appointmentStatusName') return `${item.appointmentStatusName || item.appointmentStatus || ''} ${item.status || ''}`.toLowerCase();
    return String(item[key] ?? '').toLowerCase();
  }

  function getSortedItems() {
    const dir = state.sortDir === 'asc' ? 1 : -1;
    return [...state.items].sort((a, b) => {
      const av = sortValue(a, state.sortBy);
      const bv = sortValue(b, state.sortBy);
      if (typeof av === 'number' || typeof bv === 'number') return ((Number(av) || 0) - (Number(bv) || 0)) * dir;
      return String(av).localeCompare(String(bv), 'pt-BR', { numeric: true, sensitivity: 'base' }) * dir;
    });
  }

  function updateSortIndicators() {
    document.querySelectorAll('.review-sort').forEach((button) => {
      const active = button.dataset.sort === state.sortBy;
      button.classList.toggle('active', active);
      button.setAttribute('aria-sort', active ? (state.sortDir === 'asc' ? 'ascending' : 'descending') : 'none');
      button.title = active
        ? `Ordenado ${state.sortDir === 'asc' ? 'crescente' : 'decrescente'}. Clique para inverter.`
        : 'Clique para ordenar.';
    });
  }

  function whatsappReviewUrl(item = {}) {
    const digits = onlyDigits(item.tutorWhatsapp || '').replace(/^55/, '');
    const message = whatsappReviewMessage(item);
    return digits ? `https://wa.me/55${digits}?text=${encodeURIComponent(message)}` : '';
  }

  function rowTemplate(item = {}) {
    const hasRating = Number(item.rating || 0) > 0;
    const wa = whatsappReviewUrl(item);
    const appointmentStatusName = normalizeStatusLabel(item.appointmentStatusName || item.appointmentStatus || 'Finalizado');
    const appointmentStatusClass = String(item.appointmentStatus || '').toLowerCase() === 'finalizado' ? 'ok' : 'muted-pill';
    return `<tr>
      <td><strong>${esc(item.tutorName || 'Tutor')}</strong><small>${esc(item.petName || 'Pet')}</small></td>
      <td><strong>${esc(item.services || 'Atendimento PetFunny')}</strong><small>Serviço do atendimento finalizado</small></td>
      <td>${esc(dateTime(item.startsAt))}</td>
      <td><span class="status-pill ${ratingClass(item.rating)}">${ratingEmoji(item.rating)} ${hasRating ? `${Number(item.rating)}/5` : 'Aguardando'}</span><small>${esc(item.ratingLabel || '')}</small></td>
      <td><span class="status-pill ${appointmentStatusClass}">${esc(appointmentStatusName)}</span>${hasRating ? `<small>Avaliação respondida · ${esc(dateTime(item.submittedAt))}</small>` : '<small>Avaliação pendente · link pronto para envio</small>'}</td>
      <td>
        <div class="row-actions review-actions-menu-wrap">
          <button class="dots-btn review-actions-toggle" data-id="${esc(item.id)}" type="button" aria-label="Ações da avaliação" aria-expanded="false">⋯</button>
          <div class="review-action-menu" data-menu-id="${esc(item.id)}" hidden>
            <button class="copy-review-link" data-id="${esc(item.id)}" type="button">Copiar link</button>
            ${wa ? `<a href="${wa}" target="_blank" rel="noopener">Enviar WhatsApp</a>` : `<button class="send-review-whatsapp" data-id="${esc(item.id)}" type="button">Enviar WhatsApp</button>`}
          </div>
        </div>
      </td>
    </tr>`;
  }

  function renderRows() {
    updateSortIndicators();
    if (!state.items.length) {
      rows.innerHTML = '<tr><td colspan="6">Nenhuma avaliação encontrada.</td></tr>';
      return;
    }
    rows.innerHTML = getSortedItems().map(rowTemplate).join('');
  }

  async function loadReviews() {
    showLoading('Carregando avaliações...');
    try {
      const params = new URLSearchParams({ status: state.status, search: state.search });
      const payload = await api.get(`/service-reviews?${params.toString()}`);
      state.items = payload.items || [];
      state.metrics = payload.metrics || {};
      renderMetrics();
      renderRows();
      setupPremiumInteractions();
    } catch (error) {
      rows.innerHTML = `<tr><td colspan="6">${esc(error.message || 'Erro ao carregar avaliações.')}</td></tr>`;
      toast(error.message || 'Erro ao carregar avaliações.', 'error');
    } finally { hideLoading(); finishPageLoading(); }
  }

  function closeReviewMenus() {
    document.querySelectorAll('.review-action-menu').forEach((menu) => { menu.hidden = true; });
    document.querySelectorAll('.review-actions-toggle').forEach((btn) => btn.setAttribute('aria-expanded', 'false'));
  }

  rows.addEventListener('click', (event) => {
    const toggle = event.target.closest('.review-actions-toggle');
    if (toggle) {
      event.preventDefault();
      event.stopPropagation();
      const menu = rows.querySelector(`.review-action-menu[data-menu-id="${CSS.escape(String(toggle.dataset.id || ''))}"]`);
      const shouldOpen = !menu || menu.hidden;
      closeReviewMenus();
      if (menu && shouldOpen) {
        menu.hidden = false;
        toggle.setAttribute('aria-expanded', 'true');
      }
      return;
    }

    const copyBtn = event.target.closest('.copy-review-link');
    if (copyBtn) {
      const item = state.items.find((row) => String(row.id) === String(copyBtn.dataset.id));
      if (!item?.reviewUrl) return toast('Link não encontrado.', 'warning');
      navigator.clipboard?.writeText(item.reviewUrl)
        .then(() => toast('Link copiado.', 'success'))
        .catch(() => toast('Não foi possível copiar automaticamente.', 'warning'));
      closeReviewMenus();
      return;
    }

    const waBtn = event.target.closest('.send-review-whatsapp');
    if (waBtn) {
      const item = state.items.find((row) => String(row.id) === String(waBtn.dataset.id));
      const wa = whatsappReviewUrl(item || {});
      if (!wa) return toast('WhatsApp do tutor não encontrado.', 'warning');
      window.open(wa, '_blank', 'noopener');
      closeReviewMenus();
    }
  });
  document.addEventListener('click', (event) => {
    if (!event.target.closest('.review-actions-menu-wrap')) closeReviewMenus();
  });
  document.addEventListener('keydown', (event) => {
    if (event.key === 'Escape') closeReviewMenus();
  });
  search.addEventListener('input', () => { clearTimeout(search._timer); search._timer = setTimeout(() => { state.search = search.value.trim(); loadReviews(); }, 350); });
  status.addEventListener('change', () => { state.status = status.value; loadReviews(); });
  document.querySelectorAll('.review-sort').forEach((button) => button.addEventListener('click', () => {
    const key = button.dataset.sort;
    if (!key) return;
    state.sortDir = state.sortBy === key && state.sortDir === 'asc' ? 'desc' : 'asc';
    state.sortBy = key;
    renderRows();
  }));
  document.getElementById('reload')?.addEventListener('click', loadReviews);
  loadReviews();
</script>
</body>
</html>
