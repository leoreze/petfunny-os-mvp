<!doctype html>
<html lang="pt-BR">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Comandas e Recibos · PetFunny OS</title>
  <link rel="icon" type="image/png" sizes="64x64" href="/assets/img/favicon-petfunny.png">
  <link rel="shortcut icon" href="/favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/img/apple-touch-icon.png">
  <meta name="msapplication-TileColor" content="#26b9c7">
  <link rel="stylesheet" href="/assets/css/app.css"></head>
<body>
<script type="module">
  import { buildShell } from '/assets/js/shell.js';
  import { api } from '/assets/js/api.js';
  import { showLoading, hideLoading, withLoading } from '/assets/js/loading.js';
  import { showToast } from '/assets/js/toast.js';

  const money = (cents=0)=>(Number(cents||0)/100).toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
  const dt = (v)=>v ? new Date(v).toLocaleString('pt-BR',{dateStyle:'short',timeStyle:'short'}) : '—';
  let state = { items: [], activeDocument: null };

  const content = `
    <section class="finance-toolbar outside-toolbar">
      <div>
        <p class="eyebrow">Documentos de atendimento</p>
        <h1>Comandas e Recibos</h1>
        <p>Documentos profissionais do atendimento com serviços, pets, descontos, total original, total final, link público e impressão.</p>
      </div>
      <div class="actions no-card-actions">
        <button class="btn btn-secondary" type="button" id="refresh-docs">↻ Atualizar</button>
      </div>
    </section>

    <section class="kpi-grid spacious-grid">
      <article class="metric-card"><span>Atendimentos</span><strong id="kpi-docs">—</strong><small>Comandas disponíveis</small></article>
      <article class="metric-card"><span>Recibos emitidos</span><strong id="kpi-receipts">—</strong><small>Com link público</small></article>
      <article class="metric-card"><span>Total em documentos</span><strong id="kpi-total">—</strong><small>Soma dos atendimentos listados</small></article>
      <article class="metric-card"><span>WhatsApp</span><strong>Link</strong><small>Compartilhamento preparado</small></article>
    </section>

    <section class="panel page-section">
      <div class="panel-head">
        <div><p class="eyebrow">Busca</p><h2>Atendimentos documentáveis</h2><p>Confira serviços, valores, descontos e pagamento com segurança antes de enviar ao tutor.</p></div>
      </div>
      <div class="filter-row"><input class="input" id="doc-search" placeholder="Buscar por tutor, pet ou WhatsApp"><button class="btn secondary" id="doc-search-btn">Buscar</button></div>
      <div class="table-scroll custom-scroll"><table><thead><tr><th>Atendimento</th><th>Tutor/Pet</th><th>Serviços</th><th>Status</th><th>Total</th><th>Ações</th></tr></thead><tbody id="docs-table"><tr><td colspan="6">Preparando tudo...</td></tr></tbody></table></div>
    </section>

    <dialog class="modal" id="document-modal"><div class="modal-card document-modal-card"><header class="modal-header"><div><p class="eyebrow" id="document-type">Documento</p><h2 id="document-title">Comanda</h2></div><button class="icon-button" value="cancel" onclick="this.closest('dialog').close()">✕</button></header><div class="modal-body custom-scroll"><div id="document-preview" class="document-preview"></div></div><footer class="modal-footer"><button class="btn secondary" id="print-doc">Imprimir</button><button class="btn secondary" id="copy-public-link">Copiar link</button><a class="btn" id="whatsapp-doc" target="_blank" rel="noopener">Enviar WhatsApp</a></footer></div></dialog>
  `;

  buildShell({ active:'Comandas e Recibos', eyebrow:'Documentos de atendimento', title:'Comandas e Recibos', subtitle:'Gere comandas claras, recibos profissionais e links compartilháveis para dar transparência ao atendimento e ao pagamento.', content });

  const $ = (id)=>document.getElementById(id);

  function renderRows(){
    $('docs-table').innerHTML = state.items.map(item=>`
      <tr>
        <td><strong>${dt(item.startsAt)}</strong><br><small>${item.packageSessionLabel || 'Atendimento avulso'}</small></td>
        <td><strong>${item.tutorName || 'Tutor'}</strong><br><small>${item.petName || 'Pet'} · ${item.tutorWhatsapp || ''}</small></td>
        <td>${item.services || '—'}</td>
        <td><span class="badge" style="border-color:${item.statusColor || '#00a9b7'}33;background:${item.statusColor || '#00a9b7'}18;color:${item.statusColor || '#126f9a'}">${item.statusName || item.status}</span><br><small>Financeiro: ${item.financialStatus || 'sem lançamento'}</small></td>
        <td><strong>${money(item.totalCents)}</strong><br><small>Desc. ${money(item.discountCents)}</small></td>
        <td><div class="actions compact-actions"><button class="btn secondary view-command" data-id="${item.id}">Comanda</button><button class="btn view-receipt" data-id="${item.id}">Recibo</button></div></td>
      </tr>`).join('') || '<tr><td colspan="6">Nenhum atendimento encontrado.</td></tr>';
    document.querySelectorAll('.view-command').forEach(btn=>btn.addEventListener('click',()=>openCommand(btn.dataset.id)));
    document.querySelectorAll('.view-receipt').forEach(btn=>btn.addEventListener('click',()=>openReceipt(btn.dataset.id)));
    $('kpi-docs').textContent = state.items.length;
    $('kpi-receipts').textContent = state.items.filter(i=>i.receiptToken).length;
    $('kpi-total').textContent = money(state.items.reduce((sum,i)=>sum+Number(i.totalCents||0),0));
  }

  function documentHtml(data, mode='command'){
    const appointment = data.appointment || data.document?.appointment || {};
    const business = data.business || data.document?.business || data.receipt?.payload?.business || {};
    const totals = data.totals || data.document?.totals || data.receipt?.payload?.totals || {};
    const items = appointment.items || [];
    const isReceipt = mode === 'receipt';
    const discountPercent = Number(totals.discountPercent ?? appointment.discountPercent ?? 0);
    return `<article class="print-document">
      <div class="doc-brand"><img src="/assets/img/logo-petfunny-full.png" alt="PetFunny"><div><strong>${business.name || 'PetFunny - Banho e Tosa'}</strong><small>${business.address || 'Ribeirão Preto / SP'} · WhatsApp ${business.whatsapp || ''}</small></div></div>
      <div class="doc-head"><div><p class="eyebrow">${isReceipt ? 'Recibo oficial' : 'Comanda de atendimento'}</p><h2>${isReceipt ? 'Recibo' : 'Comanda'}</h2><p>${isReceipt ? 'Pagamento recebido e atendimento documentado.' : 'Conferência dos serviços antes do pagamento.'}</p></div><div class="doc-number"><span>Nº</span><strong>${data.receipt?.documentNumber || data.documentNumber || appointment.id?.slice(0,8) || '—'}</strong></div></div>
      <div class="doc-grid"><div><span>Tutor</span><strong>${appointment.tutorName || '—'}</strong><small>${appointment.tutorWhatsapp || ''}</small></div><div><span>Pet</span><strong>${appointment.petName || '—'}</strong><small>${appointment.petSize || ''}</small></div><div><span>Data</span><strong>${dt(appointment.startsAt)}</strong></div><div><span>Status</span><strong>${appointment.statusName || appointment.status || '—'}</strong></div></div>
      <table class="doc-table"><thead><tr><th>Serviço</th><th>Qtd.</th><th>Unitário</th><th>Total</th></tr></thead><tbody>${items.map(item=>`<tr><td>${item.description}</td><td>${item.quantity}</td><td>${money(item.unitPriceCents)}</td><td>${money(item.totalCents)}</td></tr>`).join('') || `<tr><td colspan="4">${appointment.services || 'Sem itens detalhados.'}</td></tr>`}</tbody></table>
      <div class="doc-totals"><div><span>Total original</span><strong>${money(totals.subtotalCents ?? appointment.subtotalCents)}</strong></div><div><span>Desconto</span><strong>${money(totals.discountCents ?? appointment.discountCents)} · ${discountPercent}%</strong></div><div class="doc-total-final"><span>Total final</span><strong>${money(totals.totalCents ?? appointment.totalCents)}</strong></div></div>
      <footer class="doc-footer">${isReceipt ? 'Obrigado pela confiança no PetFunny. Recibo gerado eletronicamente.' : 'Esta comanda não substitui recibo. O recibo é liberado após a baixa do pagamento.'}</footer>
    </article>`;
  }

  async function load(){
    await withLoading(async()=>{
      const data = await api.get(`/api/documentos/appointments?search=${encodeURIComponent($('doc-search')?.value||'')}`);
      state.items = data.items || [];
      renderRows();
    }, 'Carregando comandas e recibos...');
  }

  async function openCommand(id){
    try {
      const data = await withLoading(()=>api.get(`/api/documentos/comanda/${id}`), 'Preparando comanda...');
      state.activeDocument = { publicUrl: null, whatsapp: data.document?.appointment?.tutorWhatsapp, text: 'Segue a comanda do atendimento PetFunny.' };
      $('document-type').textContent='Comanda'; $('document-title').textContent='Comanda de atendimento'; $('document-preview').innerHTML=documentHtml(data.document,'command'); $('copy-public-link').disabled=true; $('whatsapp-doc').href=`https://wa.me/${(state.activeDocument.whatsapp||'').replace(/\D/g,'')}?text=${encodeURIComponent(state.activeDocument.text)}`; $('document-modal').showModal();
    } catch(error){ showToast(error.message || 'Erro ao abrir comanda.', 'error'); }
  }
  async function openReceipt(id){
    try {
      const data = await withLoading(()=>api.post(`/api/documentos/recibos/${id}/generate`, {}), 'Preparando recibo...');
      const receipt = data.receipt;
      state.activeDocument = { publicUrl: receipt.printUrl, whatsapp: receipt.payload?.appointment?.tutorWhatsapp, text: `Segue o recibo do PetFunny: ${location.origin}${receipt.printUrl}` };
      $('document-type').textContent='Recibo'; $('document-title').textContent=`Recibo ${receipt.documentNumber || ''}`; $('document-preview').innerHTML=documentHtml({ receipt, ...receipt.payload },'receipt'); $('copy-public-link').disabled=false; $('whatsapp-doc').href=`https://wa.me/${(state.activeDocument.whatsapp||'').replace(/\D/g,'')}?text=${encodeURIComponent(state.activeDocument.text)}`; $('document-modal').showModal(); await load();
    } catch(error){ showToast(error.message || 'Erro ao gerar recibo.', 'error'); }
  }

  $('refresh-docs').addEventListener('click', load);
  $('doc-search-btn').addEventListener('click', load);
  $('doc-search').addEventListener('keydown', (ev)=>{ if(ev.key==='Enter') load(); });
  $('print-doc').addEventListener('click', ()=>window.print());
  $('copy-public-link').addEventListener('click', async()=>{ if(!state.activeDocument?.publicUrl) return; await navigator.clipboard.writeText(`${location.origin}${state.activeDocument.publicUrl}`); showToast('Link copiado.'); });
  load().finally(hideLoading);
</script>
</body></html>
