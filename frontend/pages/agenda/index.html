<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Agenda · PetFunny OS</title>
  
  <link rel="icon" type="image/png" sizes="64x64" href="/assets/img/favicon-petfunny.png">
  <link rel="shortcut icon" href="/favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/img/apple-touch-icon.png">
  <meta name="msapplication-TileColor" content="#26b9c7">
  <link rel="stylesheet" href="/assets/css/app.css">

  <style>
    .package-session-lock-note{border:1px solid rgba(38,185,199,.22);background:linear-gradient(135deg,rgba(38,185,199,.12),rgba(249,161,151,.12));border-radius:18px;padding:12px 14px;color:#475569;font-size:13px;line-height:1.45;margin-bottom:12px}
    .package-session-lock-note strong{display:block;color:#0f172a;margin-bottom:3px}
    .agenda-locked-field{opacity:.78}
    .agenda-appointment-modal [disabled], .agenda-appointment-modal [readonly]{cursor:not-allowed}
    .service-check-card.is-locked{opacity:.82;pointer-events:none}

    .appointment-media-share{margin-top:14px;border:1px solid rgba(38,185,199,.26);background:linear-gradient(135deg,rgba(38,185,199,.10),rgba(249,161,151,.12));border-radius:18px;padding:14px;display:grid;gap:10px}
    .appointment-media-share[hidden]{display:none!important}
    .appointment-media-share strong{color:#0f172a;font-size:14px}
    .appointment-media-share p{margin:0;color:#475569;font-size:13px;line-height:1.45}
    .appointment-media-share-actions{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
    .appointment-media-share .input{background:#fff}
  </style>
</head>
<body>
<script>window.__PETFUNNY_MANUAL_PAGE_READY = true;</script>
<script type="module">
  document.body.classList.add('agenda-page');
  import { api } from '/assets/js/api.js';
  import { buildShell, bigNumberGrid, setupPremiumInteractions } from '/assets/js/shell.js';
  import { showLoading, hideLoading, finishPageLoading, showSuccessModal, showResultModal } from '/assets/js/loading.js';
  import { toast } from '/assets/js/toast.js';
  import { bindHybridWhatsAppButtons } from '/assets/js/whatsapp.js';

  const state = {
    date: new Date().toISOString().slice(0,10),
    view: 'day',
    status: 'all',
    collaboratorId: 'all',
    items: [],
    tutors: [],
    pets: [],
    services: [],
    serviceTypes: [],
    petTypes: [],
    petSizes: [],
    statuses: [],
    collaborators: [],
    slots: [],
    editing: null,
    packageEditLocked: false
  };

  const esc = (value = '') => String(value ?? '').replace(/[&<>"]/g, (m) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));
  const money = (cents = 0) => (Number(cents || 0) / 100).toLocaleString('pt-BR', { style:'currency', currency:'BRL' });
  const dt = (value) => value ? new Date(value) : new Date();
  const hm = (value) => dt(value).toLocaleTimeString('pt-BR', { hour:'2-digit', minute:'2-digit' });
  const brDate = (value) => new Date(`${value}T12:00:00`).toLocaleDateString('pt-BR', { weekday:'long', day:'2-digit', month:'long' });
  const serviceById = (id) => state.services.find(s => s.id === id);
  const petById = (id) => state.pets.find(p => p.id === id);
  const statusByCode = (code) => state.statuses.find(s => s.code === code) || { name: code, color:'#00A9B7' };
  const statusColor = (code) => statusByCode(code).color || '#00A9B7';
  const statusName = (code) => statusByCode(code).name || code;
  const paymentStatusName = (code) => (state.paymentStatuses || []).find(p => p.code === code)?.name || (code === 'paid' ? 'Pago' : 'Pendente');
  const isPaymentPaid = (appointment = {}) => String(appointment.paymentStatus || '').toLowerCase() === 'paid' || String(paymentStatusName(appointment.paymentStatus)).toLowerCase() === 'pago';
  const initials = (name = 'P') => String(name || 'P').trim().split(/\s+/).slice(0, 2).map(part => part[0] || '').join('').toUpperCase() || 'P';
  const petPhoto = (appointment = {}) => appointment.petPhotoUrl || petById(appointment.petId)?.photoUrl || '';
  const petAvatar = (appointment = {}, size = 'sm') => {
    const photo = petPhoto(appointment);
    const label = esc(appointment.petName || 'Pet');
    return photo
      ? `<span class="pet-mini-avatar ${size}"><img src="${esc(photo)}" alt="${label}"></span>`
      : `<span class="pet-mini-avatar ${size}">${esc(initials(appointment.petName || 'Pet'))}</span>`;
  };

  buildShell({
    active: 'Agenda',
    eyebrow: 'Agenda do PetFunny',
    title: 'Agenda de atendimentos',
    subtitle: 'Acompanhe os horários do banho e tosa, organize encaixes com segurança e mantenha a equipe alinhada em cada etapa do atendimento.',
    content: `
      <section class="hero-panel stack-md agenda-hero-compact">
        <div class="page-heading-row between">
          <div>
            <p class="eyebrow">Rotina organizada</p>
            <h1>Agenda PetFunny</h1>
            <p>Visualize os horários disponíveis, confirme atendimentos, ajuste encaixes e acompanhe a operação do dia sem perder o controle da capacidade por horário.</p>
          </div>
        </div>
        <div id="agenda-metrics">${bigNumberGrid([['Agendamentos','--','no período'],['Faturamento','--','previsto'],['Slots','--','configurados']])}</div>
      </section>

      <section class="module-card stack-sm agenda-filter-card">
        <div class="section-toolbar compact-toolbar">
          <div><h3>Filtros rápidos</h3><p>Encontre atendimentos por data, status, colaborador, tutor, pet ou serviço.</p></div>
        </div>
        <div class="form-grid form-row-gap agenda-filter-grid">
          <label class="form-field agenda-date-field"><span>Data base</span><div class="agenda-date-picker"><input class="input" type="date" id="agenda-date"></div></label>
          <label class="form-field"><span>Status</span><select class="select" id="status-filter"><option value="all">Todos</option></select></label>
          <label class="form-field"><span>Colaborador</span><select class="select" id="collab-filter"><option value="all">Todos</option></select></label>
          <label class="form-field"><span>Busca rápida</span><input class="input" id="quick-search" placeholder="Tutor, pet ou serviço"></label>
        </div>
      </section>

      <section class="agenda-floating-actions">
        <div class="actions">
          <button class="btn" id="new-appointment-btn" type="button">＋ Novo agendamento</button>
          <button class="btn btn-secondary" id="historical-appointment-btn" type="button">↶ Agendamento antigo</button>
          <button class="btn btn-secondary" id="today-btn" type="button">Hoje</button>
        </div>
        <div class="actions calendar-views agenda-view-tabs" id="view-buttons">
          <button type="button" data-view="day" class="active">Dia</button>
          <button type="button" data-view="week">Semana</button>
          <button type="button" data-view="month">Mês</button>
        </div>
      </section>

      <section class="calendar-pro stack-md" id="agenda-calendar" data-view="day">
        <div class="calendar-pro-header">
          <div class="calendar-nav"><button type="button" id="prev-btn">←</button><strong class="calendar-title" id="calendar-title">Agenda</strong><button type="button" id="next-btn">→</button></div>
          <div class="actions"><span class="badge">🧲 Arraste no calendário</span><span class="badge">⏱ Slots de 1h</span></div>
        </div>
        <div class="calendar-scroll custom-scroll">
          <div class="calendar-weekdays month-only"><span>Dom</span><span>Seg</span><span>Ter</span><span>Qua</span><span>Qui</span><span>Sex</span><span>Sáb</span></div>
          <div class="calendar-month-grid" id="month-grid"></div>
          <div class="calendar-week-view" id="week-grid"></div>
          <div class="calendar-day-view" id="day-grid"></div>
        </div>
      </section>

      <section class="module-card stack-md">
        <div class="section-toolbar"><div><h3>Visão por status</h3><p>Arraste um card para outra coluna para alterar o status do agendamento.</p></div><span class="badge">Drag & drop por status</span></div>
        <div class="status-board custom-scroll" id="agenda-status-board"></div>
      </section>

      <section class="module-card stack-md">
        <div class="section-toolbar"><div><h3>Lista de agendamentos</h3><p>Cards compactos com menu de três pontinhos e ações rápidas.</p></div><span class="badge" id="list-count">0 registros</span></div>
        <div class="kanban-grid agenda-list-grid" id="agenda-list"></div>
      </section>

      <dialog class="modal-shell agenda-document-modal agenda-appointment-modal" id="agenda-document-modal">
        <div class="modal-card document-modal-card agenda-document-modal-card agenda-appointment-modal-card">
          <header class="modal-header agenda-modal-header">
            <div class="modal-title-block">
              <p class="eyebrow" id="agenda-document-type">Documento do atendimento</p>
              <h2 id="agenda-document-title">Comanda</h2>
              <p class="modal-subtitle" id="agenda-document-subtitle">Carregando as informações do atendimento com segurança, no mesmo padrão dos agendamentos.</p>
            </div>
            <button class="icon-btn modal-close-btn" type="button" id="close-document-modal" aria-label="Fechar documento">✕</button>
          </header>
          <div class="modal-body custom-scroll">
            <div id="agenda-document-preview" class="document-preview"><div class="document-loading-state"><img src="/assets/img/loading-dog.gif" alt="Carregando"><strong>Preparando documento...</strong><small>Aguarde enquanto carregamos os dados do atendimento.</small></div></div>
          </div>
          <footer class="modal-footer">
            <button class="btn btn-secondary" id="print-agenda-document" type="button">Imprimir</button>
            <button class="btn btn-secondary" id="copy-agenda-document-link" type="button">Copiar link</button>
            <a class="btn" id="whatsapp-agenda-document" target="_blank" rel="noopener">Enviar WhatsApp</a>
          </footer>
        </div>
      </dialog>



      <dialog class="modal-shell agenda-message-modal" id="appointment-media-modal">
        <form class="modal-card agenda-appointment-modal-card" id="appointment-media-form">
          <header class="modal-header agenda-modal-header">
            <div class="modal-title-block">
              <p class="eyebrow">Momentos do atendimento</p>
              <h2 id="appointment-media-title">Adicionar foto ou vídeo</h2>
              <p class="modal-subtitle" id="appointment-media-subtitle">Publique registros do pet para aparecerem na tela Momentos do App do Tutor.</p>
            </div>
            <button class="icon-btn modal-close-btn" type="button" id="close-appointment-media-modal" aria-label="Fechar momentos">✕</button>
          </header>
          <div class="modal-body custom-scroll">
            <input type="hidden" id="appointment-media-id">
            <div class="form-grid">
              <label class="form-field full-width"><span>Arquivo</span><input class="input" id="appointment-media-file" type="file" accept="image/*,video/mp4,video/webm,video/quicktime"></label>
              <label class="form-field full-width"><span>Ou URL da foto/vídeo</span><input class="input" id="appointment-media-url" placeholder="https://... ou /uploads/..." inputmode="url"></label>
              <label class="form-field"><span>Tipo</span><select class="select" id="appointment-media-type"><option value="photo">Foto</option><option value="video">Vídeo</option></select></label>
              <label class="form-field"><span>Destaque</span><select class="select" id="appointment-media-featured"><option value="false">Normal</option><option value="true">Foto principal</option></select></label>
              <label class="form-field full-width"><span>Legenda</span><textarea class="textarea" id="appointment-media-caption" rows="4" placeholder="Ex.: Luna depois do banho, cheirosa e pronta para ganhar carinho. 💚"></textarea></label>
            </div>
            <div class="form-helper">Use este modal pelo menu de 3 pontinhos do agendamento. O tutor verá o conteúdo em <strong>Momentos</strong> e na Home Meu Pet.</div>
            <div class="appointment-media-share" id="appointment-media-share" hidden>
              <strong>Link Momentos Especiais gerado</strong>
              <p>Este link abre direto a página <strong>Momentos</strong> do App do Tutor, validando o acesso pelo WhatsApp do cliente.</p>
              <input class="input" id="appointment-media-share-link" readonly value="">
              <div class="appointment-media-share-actions">
                <a class="btn btn-secondary" id="appointment-media-open-link" href="#" target="_blank" rel="noopener">Abrir página</a>
                <button class="btn btn-secondary" type="button" id="appointment-media-copy-link">Copiar link</button>
                <a class="btn" id="appointment-media-send-whatsapp" href="#" target="_blank" rel="noopener">Enviar link no WhatsApp</a>
              </div>
            </div>
          </div>
          <footer class="modal-footer"><button class="btn btn-secondary" type="button" id="cancel-appointment-media-modal">Cancelar</button><button class="btn" type="submit">Salvar e gerar link</button></footer>
        </form>
      </dialog>

      <dialog class="modal-shell agenda-message-modal" id="agenda-status-message-modal">
        <div class="modal-card agenda-appointment-modal-card agenda-message-modal-card">
          <header class="modal-header agenda-modal-header">
            <div class="modal-title-block">
              <p class="eyebrow" id="status-message-eyebrow">Mensagem inteligente</p>
              <h2 id="status-message-title">Mensagem para o tutor</h2>
              <p class="modal-subtitle" id="status-message-subtitle">Aguarde a sugestão e revise o texto antes de abrir o WhatsApp.</p>
            </div>
            <button class="icon-btn modal-close-btn" type="button" id="close-status-message-modal" aria-label="Fechar mensagem">✕</button>
          </header>
          <div class="modal-body custom-scroll">
            <div class="ai-message-context" id="status-message-context"></div>
            <label class="form-field stack-sm">
              <span>Mensagem sugerida</span>
              <textarea class="textarea ai-message-textarea" id="status-message-text" rows="8"></textarea>
            </label>
          </div>
          <footer class="modal-footer">
            <button class="btn btn-secondary" id="cancel-status-message" type="button">Cancelar</button>
            <a class="btn" id="send-status-message-whatsapp" target="_blank" rel="noopener">Enviar WhatsApp</a>
          </footer>
        </div>
      </dialog>

      <dialog class="modal-shell agenda-appointment-modal" id="appointment-modal">
        <form method="dialog" class="modal-card agenda-appointment-modal-card" id="appointment-form">
          <header class="modal-header agenda-modal-header">
            <div class="modal-title-block">
              <p class="eyebrow">Agenda PetFunny</p>
              <h2 id="modal-title">Novo agendamento</h2>
              <p class="modal-subtitle">Busque o tutor pelo WhatsApp, selecione o pet e escolha os serviços compatíveis com o tipo e porte cadastrados.</p>
            </div>
            <button class="icon-btn modal-close-btn" type="button" id="close-modal" aria-label="Fechar modal">✕</button>
          </header>
          <div class="modal-body custom-scroll">
            <input type="hidden" id="appointment-id">
            <div class="package-session-lock-note" id="package-session-lock-note" hidden>
              <strong>Sessão gerada por pacote</strong>
              Este agendamento faz parte de uma venda de pacote. Para evitar divergência no financeiro, só é possível alterar data, hora e observações.
            </div>
            <div class="module-card stack-sm soft-card appointment-lookup-card">
              <label class="form-field"><span>WhatsApp do cliente</span><input class="input" id="client-whatsapp-search" inputmode="tel" autocomplete="tel" placeholder="Digite o WhatsApp para buscar automaticamente"></label>
              <p class="muted-text">Digite o WhatsApp principal do tutor. Se ele já existir, os pets serão carregados automaticamente.</p>
            </div>
            <div class="form-grid form-row-gap">
              <label class="form-field"><span>Tutor</span><select class="select" id="tutor-id" required><option value="">Selecione</option></select></label>
              <label class="form-field"><span>Pet</span><select class="select" id="pet-id" required><option value="">Selecione o tutor</option></select></label>
              <label class="form-field"><span>Data</span><input class="input" type="date" id="form-date" required></label>
              <label class="form-field"><span>Hora</span><select class="select" id="form-time" required></select></label>
              <label class="form-field"><span>Status</span><select class="select" id="form-status" required></select></label>
              <label class="form-field"><span>Colaborador</span><select class="select" id="form-collab"><option value="">Equipe PetFunny</option></select></label>
            </div>
            <div class="module-card stack-sm soft-card appointment-services-card" id="appointment-service-card" hidden>
              <h3>Serviços do agendamento</h3>
              <p>Os serviços são agrupados por tipo de serviço e filtrados pelo tipo de pet e porte cadastrados.</p>
              <div class="service-check-grid" id="service-checks"></div>
            </div>
            <div class="form-grid form-row-gap">
              <label class="form-field"><span>Desconto promocional global (%)</span><input class="input" type="number" min="0" max="100" step="0.01" id="discount-percent" value="0"></label>
              <label class="form-field"><span>Total previsto</span><input class="input" id="total-preview" readonly value="R$ 0,00"></label>
            </div>
            <label class="form-field appointment-notes-field"><span>Observações</span><textarea class="textarea" id="notes" rows="4" placeholder="Preferências, restrições, combinados com o tutor..."></textarea></label>
            <div class="form-grid form-row-gap payment-tail-grid">
              <label class="form-field"><span>Status de pagamento</span><select class="select" id="form-payment-status"></select></label>
              <label class="form-field"><span>Forma de pagamento</span><select class="select" id="form-payment-method"><option value="">A definir</option></select></label>
            </div>
          </div>
          <footer class="modal-footer"><button class="btn btn-secondary" type="button" id="cancel-modal">Cancelar</button><button class="btn" type="submit">Salvar agendamento</button></footer>
        </form>
      
</dialog>

      <dialog class="modal-shell agenda-appointment-modal" id="historical-appointment-modal">
        <form method="dialog" class="modal-card agenda-appointment-modal-card" id="historical-appointment-form">
          <header class="modal-header agenda-modal-header">
            <div class="modal-title-block">
              <p class="eyebrow">Importação histórica</p>
              <h2>Agendamento antigo</h2>
              <p class="modal-subtitle">Cadastre atendimentos já realizados, com valor final e pagamento, sem enviar notificações ao tutor.</p>
            </div>
            <button class="icon-btn modal-close-btn" type="button" id="close-historical-appointment-modal" aria-label="Fechar modal">✕</button>
          </header>
          <div class="modal-body custom-scroll">
            <div class="form-grid form-row-gap">
              <label class="form-field full-width"><span>WhatsApp do tutor</span><input class="input" id="hist-whatsapp" inputmode="tel" placeholder="Digite o WhatsApp para localizar o tutor"></label>
              <div class="form-helper full-width" id="hist-whatsapp-feedback">Digite o WhatsApp para preencher automaticamente tutor e pets vinculados.</div>
              <label class="form-field"><span>Tutor</span><select class="select" id="hist-tutor-id" required></select></label>
              <label class="form-field"><span>Pet</span><select class="select" id="hist-pet-id" required><option value="">Selecione o tutor</option></select></label>
              <div class="module-card stack-sm soft-card appointment-services-card full-width" id="hist-service-card" hidden>
                <div class="section-heading compact"><div><p class="eyebrow">Serviços realizados</p><h4>Serviços do agendamento antigo</h4><p>Selecione apenas para registrar o histórico. Estes serviços não somam no valor final.</p></div></div>
                <div class="service-check-grid" id="hist-service-checks"><p>Selecione um pet para carregar serviços compatíveis.</p></div>
              </div>
              <label class="form-field"><span>Data original</span><input class="input" type="date" id="hist-date" required></label>
              <label class="form-field"><span>Horário aproximado</span><input class="input" type="time" id="hist-time" value="09:00"></label>
              <label class="form-field"><span>Descrição do atendimento</span><input class="input" id="hist-description" placeholder="Banho, tosa, pacote antigo..."></label>
              <label class="form-field"><span>Valor final</span><input class="input" id="hist-amount" inputmode="decimal" placeholder="0,00" required></label>
              <label class="form-field"><span>Status do pagamento</span><select class="select" id="hist-payment-status"></select></label>
              <label class="form-field"><span>Forma de pagamento</span><select class="select" id="hist-payment-method"><option value="">A definir</option></select></label>
            </div>
            <label class="form-field appointment-notes-field"><span>Observações internas</span><textarea class="textarea" id="hist-notes" rows="4" placeholder="Observações sobre a importação. Não dispara WhatsApp/push."></textarea></label>
          </div>
          <footer class="modal-footer"><button class="btn btn-secondary" type="button" id="cancel-historical-appointment-modal">Cancelar</button><button class="btn" type="submit">Salvar antigo</button></footer>
        </form>
      </dialog>
    `
  });

  showLoading('Carregando agenda do PetFunny...', 'Buscando horários, slots e atendimentos cadastrados.');

  const nodes = {
    date: document.getElementById('agenda-date'),
    status: document.getElementById('status-filter'),
    collab: document.getElementById('collab-filter'),
    search: document.getElementById('quick-search'),
    metrics: document.getElementById('agenda-metrics'),
    calendar: document.getElementById('agenda-calendar'),
    month: document.getElementById('month-grid'),
    week: document.getElementById('week-grid'),
    day: document.getElementById('day-grid'),
    title: document.getElementById('calendar-title'),
    list: document.getElementById('agenda-list'),
    statusBoard: document.getElementById('agenda-status-board'),
    count: document.getElementById('list-count'),
    modal: document.getElementById('appointment-modal'),
    form: document.getElementById('appointment-form')
  };

  const fields = {
    id: document.getElementById('appointment-id'),
    whatsapp: document.getElementById('client-whatsapp-search'),
    tutorId: document.getElementById('tutor-id'),
    petId: document.getElementById('pet-id'),
    date: document.getElementById('form-date'),
    time: document.getElementById('form-time'),
    status: document.getElementById('form-status'),
    collab: document.getElementById('form-collab'),
    paymentStatus: document.getElementById('form-payment-status'),
    paymentMethod: document.getElementById('form-payment-method'),
    services: document.getElementById('service-checks'),
    discount: document.getElementById('discount-percent'),
    total: document.getElementById('total-preview'),
    notes: document.getElementById('notes'),
    packageLockNote: document.getElementById('package-session-lock-note')
  };
  const appointmentServiceCard = document.getElementById('appointment-service-card');

  const historicalFields = {
    modal: document.getElementById('historical-appointment-modal'),
    form: document.getElementById('historical-appointment-form'),
    whatsapp: document.getElementById('hist-whatsapp'),
    whatsappFeedback: document.getElementById('hist-whatsapp-feedback'),
    tutorId: document.getElementById('hist-tutor-id'),
    petId: document.getElementById('hist-pet-id'),
    serviceCard: document.getElementById('hist-service-card'),
    services: document.getElementById('hist-service-checks'),
    date: document.getElementById('hist-date'),
    time: document.getElementById('hist-time'),
    description: document.getElementById('hist-description'),
    amount: document.getElementById('hist-amount'),
    paymentStatus: document.getElementById('hist-payment-status'),
    paymentMethod: document.getElementById('hist-payment-method'),
    notes: document.getElementById('hist-notes')
  };
  const centsFromMoneyInput = (value = '') => Math.round(Number(String(value).replace(/\./g, '').replace(',', '.').replace(/[^0-9.]/g, '') || 0) * 100);


  const messageModal = {
    modal: document.getElementById('agenda-status-message-modal'),
    eyebrow: document.getElementById('status-message-eyebrow'),
    title: document.getElementById('status-message-title'),
    subtitle: document.getElementById('status-message-subtitle'),
    context: document.getElementById('status-message-context'),
    text: document.getElementById('status-message-text'),
    close: document.getElementById('close-status-message-modal'),
    cancel: document.getElementById('cancel-status-message'),
    send: document.getElementById('send-status-message-whatsapp')
  };

  const mediaModal = {
    modal: document.getElementById('appointment-media-modal'),
    form: document.getElementById('appointment-media-form'),
    id: document.getElementById('appointment-media-id'),

  function dateAdd(date, days) { const d = new Date(`${date}T12:00:00`); d.setDate(d.getDate() + days); return d.toISOString().slice(0,10); }
  function localToday() { return new Date().toISOString().slice(0,10); }
  function localNowTime() { return new Date().toTimeString().slice(0,5); }
  function isPastSlot(date, time = '00:00') { return date < localToday() || (date === localToday() && String(time).slice(0,5) <= localNowTime()); }
  function firstDayOfMonth(date) { const d = new Date(`${date}T12:00:00`); return new Date(d.getFullYear(), d.getMonth(), 1); }
  function filteredItems() {
    const q = nodes.search.value.trim().toLowerCase();
    if (!q) return state.items;
    return state.items.filter(a => [a.tutorName, a.petName, a.services, a.statusName].join(' ').toLowerCase().includes(q));
  }

  function slotTimesForDate(date) {
    const weekday = new Date(`${date}T12:00:00`).getDay();
    if (!date) return [];
    return [...new Set(state.slots
      .filter(s => Number(s.weekday) === weekday && Number(s.capacity) > 0)
      .map(s => String(s.slotTime).slice(0,5)))]
      .sort();
  }

  function calendarTimesForDate(date) {
    const configured = slotTimesForDate(date);
    const booked = filteredItems()
      .filter(a => String(a.startsAt).slice(0,10) === date)
      .map(a => hm(a.startsAt))
      .filter(Boolean);
    return [...new Set([...configured, ...booked])].sort();
  }

  function slotCapacity(date, time) {
    const weekday = new Date(`${date}T12:00:00`).getDay();
    const slot = state.slots.find(s => Number(s.weekday) === weekday && String(s.slotTime).slice(0,5) === String(time).slice(0,5));
    return Number(slot?.capacity || 0);
  }

  function slotUsed(date, time) {
    return state.items.filter(a => String(a.startsAt).slice(0,10) === date && hm(a.startsAt) === String(time).slice(0,5)).length;
  }

  function daySlotStats(date) {
    const times = slotTimesForDate(date);
    const capacity = times.reduce((sum, t) => sum + slotCapacity(date, t), 0);
    const used = state.items.filter(a => String(a.startsAt).slice(0,10) === date).length;
    return { used, capacity, available: Math.max(0, capacity - used), times };
  }

  function slotTag(date, time = '') {
    if (time) {
      const used = slotUsed(date, time);
      const capacity = slotCapacity(date, time);
      const available = Math.max(0, capacity - used);
      const statusClass = capacity && used >= capacity ? 'full' : (capacity && used >= Math.max(1, capacity - 1) ? 'warning' : 'available');
      const label = capacity && used >= capacity ? 'Lotado' : (capacity ? 'ocupados' : 'sem limite');
      return `<span class="slot-mini-tag ${statusClass}">${used}/${capacity || 0} ${label}</span>`;
    }
    const stats = daySlotStats(date);
    const statusClass = stats.capacity && stats.used >= stats.capacity ? 'full' : (stats.capacity && stats.used >= Math.max(1, stats.capacity - 1) ? 'warning' : 'available');
    const label = stats.capacity && stats.used >= stats.capacity ? 'Lotado' : 'ocupados';
    return `<span class="slot-mini-tag ${statusClass}">${stats.used}/${stats.capacity || 0} ${label}</span>`;
  }

  function quickScheduleButton(date, time = '') {
    const available = time ? Math.max(0, slotCapacity(date, time) - slotUsed(date, time)) : daySlotStats(date).available;
    if (available <= 0 || (time && isPastSlot(date, time)) || (!time && date < localToday())) return '';
    return `<button class="quick-schedule-btn" type="button" data-new-date="${esc(date)}" data-new-time="${esc(time)}" title="Novo agendamento neste horário">＋</button>`;
  }

  function populateSelects() {
    nodes.status.innerHTML = '<option value="all">Todos</option>' + state.statuses.map(s => `<option value="${esc(s.code)}">${esc(s.name)}</option>`).join('');
    fields.status.innerHTML = state.statuses.map(s => `<option value="${esc(s.code)}">${esc(s.name)}</option>`).join('');
    nodes.collab.innerHTML = '<option value="all">Todos</option>' + state.collaborators.map(c => `<option value="${esc(c.id)}">${esc(c.name)}</option>`).join('');
    fields.collab.innerHTML = '<option value="">Equipe PetFunny</option>' + state.collaborators.map(c => `<option value="${esc(c.id)}">${esc(c.name)}</option>`).join('');
    fields.tutorId.innerHTML = '<option value="">Selecione</option>' + state.tutors.map(t => `<option value="${esc(t.id)}">${esc(t.name)} · ${esc(t.whatsapp || '')}</option>`).join('');
    fields.paymentStatus.innerHTML = (state.paymentStatuses || []).map(p => `<option value="${esc(p.code)}">${esc(p.name)}</option>`).join('') || '<option value="pending">Pendente</option><option value="paid">Pago</option>';
    fields.paymentMethod.innerHTML = '<option value="">A definir</option>' + (state.paymentMethods || []).map(p => `<option value="${esc(p.id)}">${esc(p.name)}</option>`).join('');
    if (historicalFields.tutorId) historicalFields.tutorId.innerHTML = '<option value="">Selecione</option>' + state.tutors.map(t => `<option value="${esc(t.id)}">${esc(t.name)} · ${esc(t.whatsapp || '')}</option>`).join('');
    if (historicalFields.paymentStatus) historicalFields.paymentStatus.innerHTML = (state.paymentStatuses || []).map(p => `<option value="${esc(p.code)}">${esc(p.name)}</option>`).join('') || '<option value="pending">Pendente</option><option value="paid" selected>Pago</option>';
    if (historicalFields.paymentMethod) historicalFields.paymentMethod.innerHTML = '<option value="">A definir</option>' + (state.paymentMethods || []).map(p => `<option value="${esc(p.id)}">${esc(p.name)}</option>`).join('');
    renderTimes();
  }

  function buildTimeOptionsFromSlots(slots = [], selectedTime = '') {
    const selected = String(selectedTime || '').slice(0, 5);
    const options = Array.isArray(slots) ? [...slots] : [];
    const hasSelected = selected && options.some(slot => String(slot.time || slot).slice(0, 5) === selected);
    if (selected && !hasSelected) {
      options.unshift({ time: selected, label: `${selected} · horário atual do agendamento` });
    }
    return options;
  }

  async function renderTimes(selectedTime = '') {
    const date = fields.date.value || state.date;
    const selected = String(selectedTime || '').slice(0, 5);
    const isEditing = Boolean(fields.id?.value);
    fields.time.disabled = true;
    fields.time.innerHTML = '<option value="">Carregando horários...</option>';
    try {
      const exclude = fields.id?.value ? `&excludeAppointmentId=${encodeURIComponent(fields.id.value)}` : '';
      const response = await api.get(`/agenda/availability?date=${encodeURIComponent(date)}${exclude}`);
      const slots = buildTimeOptionsFromSlots(response.slots || [], selected);
      fields.time.innerHTML = slots.length ? slots.map(slot => {
        const value = String(slot.time || slot).slice(0, 5);
        const label = slot.label || value;
        return `<option value="${esc(value)}" ${value === selected ? 'selected' : ''}>${esc(label)}</option>`;
      }).join('') : '<option value="">Sem horários disponíveis</option>';
      fields.time.disabled = !slots.length;
      if (selected && isEditing) fields.time.value = selected;
    } catch (error) {
      const fallbackSlots = buildTimeOptionsFromSlots(slotTimesForDate(date).map(time => ({ time, label: time })), selected);
      fields.time.innerHTML = fallbackSlots.length ? fallbackSlots.map(slot => {
        const value = String(slot.time || slot).slice(0, 5);
        const label = slot.label || value;
        return `<option value="${esc(value)}" ${value === selected ? 'selected' : ''}>${esc(label)}</option>`;
      }).join('') : '<option value="">Sem horários disponíveis</option>';
      fields.time.disabled = !fallbackSlots.length;
      if (selected && isEditing) fields.time.value = selected;
    }
  }

  function notesFromContext(tutor, pet) {
    const parts = [];
    const tutorNote = tutor?.notes || tutor?.observations || tutor?.preferences || '';
    const petNote = pet?.notes || pet?.observations || pet?.restrictions || pet?.behavior_notes || '';
    if (tutorNote) parts.push(`Tutor: ${tutorNote}`);
    if (petNote) parts.push(`Pet: ${petNote}`);
    return parts.join('\n');
  }

  function completeFieldsFromSelection({ forceNotes = false } = {}) {
    const tutor = state.tutors.find(t => t.id === fields.tutorId.value);
    const pet = petById(fields.petId.value);
    if (tutor?.whatsapp && fields.whatsapp) fields.whatsapp.value = tutor.whatsapp;
    const contextNotes = notesFromContext(tutor, pet);
    if (!state.editing && contextNotes && (forceNotes || !fields.notes.value.trim())) {
      fields.notes.value = contextNotes;
    }
  }

  function isPackageAppointment(item = state.editing) {
    return Boolean(item?.customerPackageId || item?.packageSessionNumber || item?.packageTotalSessions || item?.packageSessionLabel);
  }

  function ensureAppointmentTutorAndPetOptions(item = {}) {
    if (item?.tutorId && !state.tutors.some(t => t.id === item.tutorId)) {
      state.tutors.push({ id: item.tutorId, name: item.tutorName || 'Tutor do pacote', whatsapp: item.tutorWhatsapp || '' });
    }
    if (item?.petId && !state.pets.some(p => p.id === item.petId)) {
      state.pets.push({ id: item.petId, tutorId: item.tutorId, name: item.petName || 'Pet do pacote', size: item.petSize || '', sizeName: item.petSize || '', photoUrl: item.petPhotoUrl || '' });
    }
  }

  function setLockedClass(element, locked) {
    element?.closest?.('.form-field')?.classList.toggle('agenda-locked-field', Boolean(locked));
  }

  function applyPackageEditLock(item = null) {
    const locked = Boolean(item && isPackageAppointment(item));
    state.packageEditLocked = locked;
    if (fields.packageLockNote) {
      fields.packageLockNote.hidden = !locked;
      const label = item?.packageSessionLabel || (item?.packageSessionNumber && item?.packageTotalSessions ? `${item.packageSessionNumber} de ${item.packageTotalSessions}` : 'sessão de pacote');
      fields.packageLockNote.innerHTML = `<strong>Sessão gerada por pacote · ${esc(label)}</strong>Este agendamento pertence a um pacote vendido. Para manter pacote, pagamento e recibo consistentes, altere apenas data, hora e observações.`;
    }
    [fields.whatsapp, fields.tutorId, fields.petId, fields.status, fields.collab, fields.paymentStatus, fields.paymentMethod, fields.discount].forEach(el => {
      if (el) { el.disabled = locked; setLockedClass(el, locked); }
    });
    fields.services?.querySelectorAll('input[type="checkbox"]').forEach(input => { input.disabled = locked; input.closest('.service-check-card')?.classList.toggle('is-locked', locked); });
    fields.total.readOnly = true;
    if (locked) fields.total.value = money(item?.totalCents || item?.total_cents || 0);
    if (appointmentServiceCard) appointmentServiceCard.classList.toggle('agenda-locked-field', locked);
  }

  function renderPetsForTutor({ autoSelectSingle = false, selectedPetId = '' } = {}) {
    const tutorId = fields.tutorId.value;
    const currentPetId = selectedPetId || fields.petId.value || state.editing?.petId || '';
    let pets = state.pets.filter(p => p.tutorId === tutorId);
    const currentPet = currentPetId ? petById(currentPetId) : null;
    if (currentPet && !pets.some(p => p.id === currentPet.id)) pets = [currentPet, ...pets];
    fields.petId.innerHTML = '<option value="">Selecione</option>' + pets.map(p => `<option value="${esc(p.id)}">${esc(p.name)} · ${esc(p.sizeName || p.size || 'sem porte')}</option>`).join('');
    if (currentPetId && pets.some(p => p.id === currentPetId)) fields.petId.value = currentPetId;
    else if (autoSelectSingle && pets.length === 1) fields.petId.value = pets[0].id;
    completeFieldsFromSelection();
    renderServiceChecks();
  }

  function renderServiceChecks() {
    const pet = petById(fields.petId.value);
    if (!pet) {
      if (appointmentServiceCard) appointmentServiceCard.hidden = true;
      fields.services.innerHTML = '<p>Selecione um pet para carregar os serviços compatíveis.</p>';
      updateTotal();
      return;
    }
    if (appointmentServiceCard) appointmentServiceCard.hidden = false;
    const petSize = pet?.size || 'todos';
    const petType = pet?.species || '';
    const selected = new Set(Array.from(fields.services.querySelectorAll('input:checked')).map(i => i.value));
    const services = state.services.filter(s => {
      const serviceSizeOk = s.petSize === 'todos' || s.petSize === petSize;
      const categorySizeOk = !s.categoryPetSizeCode || s.categoryPetSizeCode === petSize || s.categoryPetSizeCode === 'todos';
      const categoryTypeOk = !s.categoryPetTypeCode || s.categoryPetTypeCode === petType;
      return serviceSizeOk && categorySizeOk && categoryTypeOk;
    });
    const byCategory = new Map();
    services.forEach(service => {
      const key = service.categoryId || 'outros';
      if (!byCategory.has(key)) byCategory.set(key, { name: service.categoryName || 'Outros serviços', items: [] });
      byCategory.get(key).items.push(service);
    });
    fields.services.innerHTML = services.length ? Array.from(byCategory.values()).map(group => `
      <div class="service-type-group">
        <div class="service-type-group-head">
          <span class="service-type-icon" aria-hidden="true">✂️</span>
          <div class="service-type-title"><strong>${esc(group.name)}</strong><small>${group.items.length} serviço(s) compatíveis com este pet</small></div>
        </div>
        <div class="service-check-grid-inner">
          ${group.items.map(s => `
            <label class="service-check-card">
              <input type="checkbox" value="${esc(s.id)}" ${selected.has(s.id) ? 'checked' : ''}>
              <span><strong>${esc(s.name)}</strong><small>${esc(s.petSizeName || s.petSize)} · ${s.durationMinutes}min</small></span>
              <b>${money(s.priceCents)}</b>
            </label>
          `).join('')}
        </div>
      </div>
    `).join('') : '<p>Nenhum serviço ativo para o tipo e porte deste pet. Confira Tipos de Serviços, Portes e Serviços em Configurações.</p>';
    if (state.packageEditLocked) {
      fields.services?.querySelectorAll('input[type="checkbox"]').forEach(input => { input.disabled = true; input.closest('.service-check-card')?.classList.add('is-locked'); });
    }
    updateTotal();
  }

  async function lookupClientByWhatsapp() {
    const whatsapp = fields.whatsapp.value.replace(/\D/g, '');
    if (whatsapp.length < 10) return;
    try {
      showLoading('Buscando cliente...', 'Consultando cadastro pelo WhatsApp.');
      const data = await api.get(`/agenda/client-lookup?whatsapp=${encodeURIComponent(whatsapp)}`);
      if (!data.found) {
        toast('Cliente não encontrado. Cadastre o tutor antes de continuar.', 'warning');
        fields.tutorId.value = '';
        fields.petId.innerHTML = '<option value="">Cliente não encontrado</option>';
        renderServiceChecks();
        return;
      }
      if (!state.tutors.some(t => t.id === data.tutor.id)) state.tutors.push(data.tutor);
      data.pets.forEach(pet => { if (!state.pets.some(p => p.id === pet.id)) state.pets.push(pet); });
      populateSelects();
      fields.whatsapp.value = data.tutor.whatsapp || fields.whatsapp.value;
      fields.tutorId.value = data.tutor.id;
      renderPetsForTutor({ autoSelectSingle: data.pets.length === 1 });
      completeFieldsFromSelection({ forceNotes: data.pets.length === 1 });
      toast('Cliente localizado. Pets carregados automaticamente.', 'success');
    } catch (error) { toast(error.message, 'error'); }
    finally { hideLoading(); }
  }

  function updateTotal() {
    if (state.packageEditLocked && state.editing) {
      fields.total.value = money(state.editing.totalCents || state.editing.total_cents || 0);
      return;
    }
    const ids = Array.from(fields.services.querySelectorAll('input:checked')).map(i => i.value);
    const subtotal = ids.reduce((sum, id) => sum + Number(serviceById(id)?.priceCents || 0), 0);
    const disc = Math.max(0, Math.min(100, Number(fields.discount.value || 0)));
    fields.total.value = money(Math.max(0, subtotal - Math.round(subtotal * disc / 100)));
  }

  function statusMessageContextHtml(payload = {}) {
    const a = payload.appointment || {};
    const status = payload.status || {};
    const payment = [a.paymentStatusName || paymentStatusName(a.paymentStatus), a.paymentMethodName].filter(Boolean).join(' · ');
    return `<div class="ai-message-context-grid">
      <div><span>Tutor</span><strong>${esc(a.tutorName || '—')}</strong></div>
      <div><span>Pet</span><strong>${esc(a.petName || '—')}</strong></div>
      <div><span>Novo status</span><strong>${esc(status.name || a.statusName || a.status || '—')}</strong></div>
      <div><span>Horário</span><strong>${esc(a.startsAt ? dt(a.startsAt).toLocaleString('pt-BR', { dateStyle:'short', timeStyle:'short' }) : '—')}</strong></div>
      <div><span>Serviço</span><strong>${esc(a.services || '—')}</strong></div>
      <div><span>Pagamento</span><strong>${esc(payment || 'A definir')}</strong></div>
    </div>`;
  }

  async function openStatusMessageModal(id, status = '') {
    if (!id || !messageModal.modal) return;
    try {
      messageModal.eyebrow.textContent = 'Assistente Inteligente PetFunny';
      messageModal.title.textContent = 'Preparando mensagem';
      messageModal.subtitle.textContent = 'A mensagem será criada com os dados do agendamento e o contexto do status.';
      messageModal.context.innerHTML = '<div class="document-loading-state compact"><img src="/assets/img/loading-dog.gif" alt="Carregando"><strong>Gerando sugestão...</strong><small>Organizando informações do tutor, pet e atendimento.</small></div>';
      messageModal.text.value = '';
      messageModal.send.href = '#';
      messageModal.send.classList.add('disabled');
      messageModal.modal.classList.add('is-loading');
      if (!messageModal.modal.open) messageModal.modal.showModal();
      const qs = status ? `?status=${encodeURIComponent(status)}` : '';
      const payload = await api.get(`/agenda/${id}/status-message${qs}`);
      const statusNameLabel = payload.status?.name || payload.appointment?.statusName || 'atendimento';
      messageModal.title.textContent = `Mensagem sobre ${statusNameLabel}`;
      messageModal.subtitle.textContent = 'Revise a sugestão. Ao clicar em enviar, o WhatsApp abre com o texto pronto para a equipe confirmar o envio.';
      messageModal.context.innerHTML = statusMessageContextHtml(payload);
      messageModal.text.value = payload.message || '';
      messageModal.modal.classList.remove('is-loading');
      const updateLink = () => {
        const phone = payload.phone || payload.appointment?.tutorWhatsapp || '';
        const digits = String(phone || '').replace(/\D/g, '');
        const normalized = digits ? (digits.startsWith('55') ? digits : `55${digits}`) : '';
        const href = normalized ? `https://wa.me/${normalized}?text=${encodeURIComponent(messageModal.text.value || '')}` : `https://wa.me/?text=${encodeURIComponent(messageModal.text.value || '')}`;
        messageModal.send.href = href;
        messageModal.send.classList.remove('disabled');
      };
      messageModal.text.oninput = updateLink;
      updateLink();
    } catch (error) {
      messageModal.modal.classList.remove('is-loading');
      if (messageModal.modal.open) messageModal.modal.close();
      toast(error.message || 'Não foi possível gerar a mensagem.', 'error');
    }
  }

  function getGlobalActionMenu() {
    let menu = document.getElementById('agenda-global-action-menu');
    if (!menu) {
      menu = document.createElement('div');
      menu.id = 'agenda-global-action-menu';
      menu.className = 'agenda-global-action-menu';
      menu.hidden = true;
      menu.setAttribute('role', 'menu');
      document.body.appendChild(menu);
    }
    return menu;
  }

  function closeFloatingMenus() {
    document.querySelectorAll('.kebab-btn[aria-expanded="true"]').forEach(btn => btn.setAttribute('aria-expanded', 'false'));
    const menu = getGlobalActionMenu();
    menu.hidden = true;
    menu.classList.remove('is-open');
    menu.style.display = 'none';
    menu.style.visibility = 'hidden';
    menu.style.opacity = '0';
    menu.style.pointerEvents = 'none';
    menu.innerHTML = '';
    menu.removeAttribute('data-id');
  }

  function openFloatingMenu(button) {
    const id = button.dataset.id || button.closest('[data-id]')?.dataset.id;
    if (!id) return;
    const appointment = state.items.find(item => item.id === id) || {};
    const menu = getGlobalActionMenu();
    const alreadyOpen = !menu.hidden && menu.dataset.id === id;
    closeFloatingMenus();
    if (alreadyOpen) return;

    const receiptButton = isPaymentPaid(appointment) ? `<button class="view-receipt-modal" data-id="${esc(id)}" type="button">🧾 Recibo</button>` : '';
    menu.dataset.id = id;
    menu.innerHTML = `
      <button class="edit-appointment" data-id="${esc(id)}" type="button">✏️ Editar</button>
      <button class="status-action" data-id="${esc(id)}" data-status="cancelado" type="button">🚫 Cancelar</button>
      <button class="delete-appointment-action danger" data-id="${esc(id)}" type="button">🗑️ Excluir agendamento</button>
      <button class="view-command-modal" data-id="${esc(id)}" type="button">📋 Comanda</button>
      <button class="appointment-media-action" data-id="${esc(id)}" type="button">📸 Momentos do atendimento</button>
      ${receiptButton}
      <button class="ai-status-message-action" data-id="${esc(id)}" type="button">✨ Enviar mensagem</button>
    `;

    const rect = button.getBoundingClientRect();
    const gutter = 12;
    menu.hidden = false;
    menu.classList.add('is-open');
    menu.style.display = 'grid';
    menu.style.visibility = 'visible';
    menu.style.opacity = '1';
    menu.style.pointerEvents = 'auto';
    button.setAttribute('aria-expanded', 'true');

    const width = Math.max(menu.offsetWidth || 224, 224);
    const height = Math.max(menu.offsetHeight || 220, 180);
    const left = Math.min(window.innerWidth - width - gutter, Math.max(gutter, rect.right - width));
    let top = rect.bottom + 8;
    if (top + height > window.innerHeight - gutter) top = Math.max(gutter, rect.top - height - 8);
    menu.style.left = `${left}px`;
    menu.style.top = `${top}px`;
  }



  function fileToDataUrl(file) {
    return new Promise((resolve, reject) => {
      if (!file) return resolve('');
      const reader = new FileReader();
      reader.onload = () => resolve(String(reader.result || ''));
      reader.onerror = () => reject(new Error('Não foi possível ler o arquivo selecionado.'));
      reader.readAsDataURL(file);
    });
  }

    if (!mediaModal.modal || !id) return;
    mediaModal.id.value = id;

  function resetAppointmentMediaShare() {
    if (mediaModal.shareBox) mediaModal.shareBox.hidden = true;
    if (mediaModal.shareLink) mediaModal.shareLink.value = '';
    if (mediaModal.openLink) mediaModal.openLink.href = '#';

  function showAppointmentMediaShare(share = {}) {
    const link = share.momentsLink || share.url || '';
    if (!link) return;
    if (mediaModal.shareBox) mediaModal.shareBox.hidden = false;
    if (mediaModal.shareLink) mediaModal.shareLink.value = link;
    if (mediaModal.openLink) mediaModal.openLink.href = link;
    if (mediaModal.sendWhatsapp) mediaModal.sendWhatsapp.href = share.whatsappUrl || `https://wa.me/?text=${encodeURIComponent(share.message || link)}`;

  async function saveAppointmentMedia(event) {
    event.preventDefault();
    const id = mediaModal.id?.value;
    if (!id) return toast('Agendamento não identificado.', 'error');
    const file = mediaModal.file?.files?.[0];
    const url = mediaModal.url?.value?.trim() || '';
    if (!file && !url) return toast('Selecione uma foto/vídeo ou informe uma URL.', 'warning');
    try {
      showLoading('Salvando momento...', 'Publicando foto ou vídeo no App do Tutor.');
      const dataUrl = file ? await fileToDataUrl(file) : '';
      const response = await api.post(`/agenda/${id}/media`, {
        dataUrl,
        url,
        mediaType: mediaModal.type?.value || (file?.type?.startsWith('video/') ? 'video' : 'photo'),
        caption: mediaModal.caption?.value || '',
        featured: mediaModal.featured?.value === 'true'
      });
      showAppointmentMediaShare(response.share || {});
      toast(response.share?.momentsLink ? 'Momento publicado e link para o tutor gerado.' : 'Momento publicado no App do Tutor.', 'success');
    } catch (error) {
      toast(error.message || 'Não foi possível salvar o momento.', 'error');
    } finally {
      hideLoading();
    }
  }

  async function openAgendaDocumentModal(id, mode = 'command') {
    const modal = document.getElementById('agenda-document-modal');
    const preview = document.getElementById('agenda-document-preview');
    const type = document.getElementById('agenda-document-type');
    const title = document.getElementById('agenda-document-title');
    const subtitle = document.getElementById('agenda-document-subtitle');
    const copyButton = document.getElementById('copy-agenda-document-link');
    const whatsapp = document.getElementById('whatsapp-agenda-document');
    if (!modal || !preview) return;
    try {
      type.textContent = mode === 'receipt' ? 'Recibo oficial' : 'Comanda de atendimento';
      title.textContent = mode === 'receipt' ? 'Preparando recibo' : 'Preparando comanda';
      subtitle.textContent = 'Carregando as informações do atendimento com segurança, sem sair da Agenda.';
      preview.innerHTML = '<div class="document-loading-state"><img src="/assets/img/loading-dog.gif" alt="Carregando"><strong>Preparando documento...</strong><small>Buscando serviços, valores, tutor e pet.</small></div>';
      if (!modal.open) modal.showModal();
      showLoading(mode === 'receipt' ? 'Preparando recibo...' : 'Preparando comanda...', 'Carregando documento do atendimento.');
      const data = mode === 'receipt'
        ? await api.post(`/documentos/recibos/${id}/generate`, {})
        : await api.get(`/documentos/comanda/${id}`);
      const receipt = data.receipt;
      const documentData = mode === 'receipt' ? { receipt, ...(receipt?.payload || {}) } : data.document;
      const isPackageDocument = documentData?.type === 'package' || Boolean(documentData?.customerPackage);
      const appointment = documentData?.appointment || receipt?.payload?.appointment || {};
      const pack = documentData?.customerPackage || receipt?.payload?.customerPackage || null;
      const publicUrl = isPackageDocument
        ? (mode === 'receipt' ? (documentData?.receiptUrl || receipt?.printUrl) : (documentData?.commandUrl || documentData?.publicUrl))
        : (mode === 'receipt' ? receipt?.printUrl : (documentData?.publicUrl || data.document?.publicUrl || `/documentos/comanda/${id}`));
      type.textContent = isPackageDocument ? (mode === 'receipt' ? 'Recibo do pacote' : 'Comanda do pacote') : (mode === 'receipt' ? 'Recibo oficial' : 'Comanda de atendimento');
      title.textContent = isPackageDocument ? `${mode === 'receipt' ? 'Recibo' : 'Comanda'} consolidada do pacote` : (mode === 'receipt' ? `Recibo ${receipt?.documentNumber || ''}`.trim() : 'Comanda do agendamento');
      subtitle.textContent = isPackageDocument ? 'Este agendamento pertence a um pacote. O documento mostra o pacote completo, todas as sessões, serviços, quantidades e desconto.' : (mode === 'receipt' ? 'Pagamento recebido e pronto para envio ao tutor.' : 'Confira serviços, descontos e totais antes de finalizar ou enviar ao tutor.');
      preview.innerHTML = isPackageDocument ? packageAgendaDocumentHtml(documentData, mode) : agendaDocumentHtml(documentData, mode);
      copyButton.disabled = !publicUrl;
      copyButton.dataset.publicUrl = publicUrl ? `${location.origin}${publicUrl}` : '';
      const phone = String((pack?.tutorWhatsapp || appointment.tutorWhatsapp || '')).replace(/\D/g, '');
      const fullUrl = publicUrl ? `${location.origin}${publicUrl}` : '';
      const petName = (pack?.petName || appointment.petName) ? ` do ${pack?.petName || appointment.petName}` : '';
      const message = isPackageDocument
        ? `Oi! Tudo bem? Segue ${mode === 'receipt' ? 'o recibo consolidado' : 'a comanda consolidada'} do pacote${petName} aqui no PetFunny - Banho e Tosa. Você pode acessar pelo link: ${fullUrl}`
        : (mode === 'receipt'
          ? `Oi! Tudo bem? Segue o recibo do atendimento${petName} aqui no PetFunny - Banho e Tosa. Você pode acessar pelo link: ${fullUrl}`
          : `Oi! Tudo bem? Segue a comanda do atendimento${petName} aqui no PetFunny - Banho e Tosa para conferência. Você pode acessar pelo link: ${fullUrl}`);
      whatsapp.href = phone ? `https://wa.me/${phone}?text=${encodeURIComponent(message)}` : `https://wa.me/?text=${encodeURIComponent(message)}`;
    } catch (error) {
      toast(error.message || 'Não foi possível abrir o documento.', 'error');
      if (modal.open) modal.close();
    } finally {
      hideLoading();
    }
  }

        <div class="status-dropzone" data-status="${esc(st.code)}">

  function bindDragAndDrop() {
    document.querySelectorAll('.appointment-card[draggable="true"]').forEach(card => {
      card.addEventListener('dragstart', event => {
        event.dataTransfer.setData('text/plain', card.dataset.id);
        event.dataTransfer.effectAllowed = 'move';
        card.classList.add('is-dragging');
      });
      card.addEventListener('dragend', () => card.classList.remove('is-dragging'));
    });
    document.querySelectorAll('.status-dropzone').forEach(zone => {
      zone.addEventListener('dragover', event => { event.preventDefault(); zone.classList.add('is-over'); });
      zone.addEventListener('dragleave', () => zone.classList.remove('is-over'));
      zone.addEventListener('drop', async event => {
        event.preventDefault();
        zone.classList.remove('is-over');
        const id = event.dataTransfer.getData('text/plain');
        const status = zone.dataset.status;
        const item = state.items.find(a => a.id === id);
        if (!id || !status || item?.status === status) return;
        try {
          showLoading('Atualizando status...', `Movendo agendamento para ${statusName(status)}.`);
          await api.patch(`/agenda/${id}/status`, { status });
          toast('Status atualizado por drag & drop.', 'success');
          await loadAgenda({ silent: true });
        } catch (error) { toast(error.message, 'error'); }
        finally { hideLoading(); }
      });
    });
  }

    const activeSlots = state.slots.filter(s => Number(s.capacity) > 0).length;
    nodes.metrics.innerHTML = bigNumberGrid([[ 'Agendamentos', String(list.length), state.view ], [ 'Faturamento', money(total), 'previsto' ], [ 'Slots', String(activeSlots), 'por semana' ]]);
