  async function rescheduleAppointment(id, targetDate, targetTime = '') {
    const item = state.items.find(a => a.id === id);
    if (!item || !targetDate) return;
    const time = targetTime || hm(item.startsAt);
    const startsAt = `${targetDate}T${time}:00`;
    if (String(item.startsAt).slice(0,16) === startsAt.slice(0,16)) return;
    try {
      showLoading('Reagendando atendimento...', `Movendo para ${brDate(targetDate)} às ${time}.`);
      await api.patch(`/agenda/${id}/reschedule`, { startsAt });
      toast('Agendamento atualizado no calendário.', 'success');
      await loadAgenda({ silent: true });
    } catch (error) { toast(error.message, 'error'); }
    finally { hideLoading(); }
  }

  function renderDay() {
    const times = calendarTimesForDate(state.date);
    nodes.day.innerHTML = times.length ? times.map(t => {
      const hourItems = filteredItems().filter(a => hm(a.startsAt) === t);
      return `<div class="time-cell"><strong>${esc(t)}</strong></div><div class="slot-cell calendar-drop-target" data-date="${esc(state.date)}" data-slot="${esc(t)}"><div class="slot-cell-head"><div class="slot-actions-inline">${quickScheduleButton(state.date, t)}${slotTag(state.date, t)}</div></div><div class="slot-events-row">${hourItems.map(a => calendarEvent(a)).join('') || '<small>Horário livre</small>'}</div></div>`;
    }).join('') : '<div class="time-cell">--</div><div class="slot-cell">Sem slots configurados para este dia.</div>';
  }

  function renderWeek() {
    const start = dateAdd(state.date, -new Date(`${state.date}T12:00:00`).getDay());
    const days = Array.from({ length:7 }, (_, i) => dateAdd(start, i));
    const times = [...new Set([
      ...state.slots.map(s => String(s.slotTime).slice(0,5)),
      ...filteredItems().filter(a => days.includes(String(a.startsAt).slice(0,10))).map(a => hm(a.startsAt))
    ])].filter(Boolean).sort();
    nodes.week.innerHTML = '<div class="time-cell">Hora</div>' + days.map(d => `<div class="time-cell day-heading"><strong>${new Date(`${d}T12:00:00`).toLocaleDateString('pt-BR',{weekday:'short',day:'2-digit'})}</strong></div>`).join('') + times.map(t => `<div class="time-cell"><strong>${esc(t)}</strong></div>${days.map(d => {
      const items = filteredItems().filter(a => String(a.startsAt).slice(0,10) === d && hm(a.startsAt) === t);
      return `<div class="slot-cell calendar-drop-target" data-date="${esc(d)}" data-slot="${esc(t)}"><div class="slot-cell-head"><div class="slot-actions-inline">${quickScheduleButton(d, t)}${slotTag(d, t)}</div></div><div class="slot-events-row">${items.map(a => calendarEvent(a)).join('') || '<small>Horário livre</small>'}</div></div>`;
    }).join('')}`).join('');
  }

  function renderMonth() {
    const first = firstDayOfMonth(state.date);
    const month = first.getMonth();
    const gridStart = new Date(first); gridStart.setDate(first.getDate() - first.getDay());
    const days = Array.from({ length:42 }, (_, i) => { const d = new Date(gridStart); d.setDate(gridStart.getDate()+i); return d; });
    nodes.month.innerHTML = days.map(d => {
      const iso = d.toISOString().slice(0,10);
      const items = filteredItems().filter(a => String(a.startsAt).slice(0,10) === iso);
      const stats = daySlotStats(iso);
      return `<div class="calendar-day calendar-drop-target ${d.getMonth() !== month ? 'muted' : ''} ${iso === new Date().toISOString().slice(0,10) ? 'today' : ''}" data-date="${esc(iso)}"><div class="calendar-date"><span>${d.getDate()}</span><span class="calendar-count">${items.length}</span></div><div class="month-slot-row"><div class="slot-actions-inline">${quickScheduleButton(iso, stats.times[0] || '')}${slotTag(iso)}</div></div>${items.slice(0,3).map(a => calendarEvent(a, true)).join('')}</div>`;
    }).join('');
  }

  function renderAll() {
    nodes.calendar.dataset.view = state.view;
    nodes.title.textContent = `${state.view === 'day' ? 'Dia' : state.view === 'week' ? 'Semana' : 'Mês'} · ${brDate(state.date)}`;
    nodes.list.innerHTML = filteredItems().length ? filteredItems().map(appointmentCard).join('') : '<article class="module-card empty-state"><strong>Nenhum agendamento encontrado.</strong><p>Ajuste os filtros ou crie um novo agendamento.</p></article>';
    if (state.view === 'day') renderDay();
    if (state.view === 'week') renderWeek();
    if (state.view === 'month') renderMonth();
    renderStatusBoard(); renderMetrics(); setupPremiumInteractions(document); bindHybridWhatsAppButtons(document);
  }

  async function loadBaseData() {
    const [options, tutors, pets, services] = await Promise.all([
      api.get('/agenda/options'),
      api.get('/tutores?status=active&limit=100'),
      api.get('/pets?status=active&limit=200'),
      api.get('/servicos?status=active&limit=200')
    ]);
    state.statuses = options.statuses || [];
    state.collaborators = options.collaborators || [];
    state.paymentStatuses = options.paymentStatuses || [];
    state.paymentMethods = options.paymentMethods || [];
    state.serviceTypes = options.serviceTypes || [];
    state.petTypes = options.petTypes || [];
    state.petSizes = options.petSizes || [];
    state.slots = options.timeSlotCapacities || [];
    state.tutors = tutors.items || [];
    state.pets = pets.items || [];
    state.services = services.items || [];
    populateSelects();
  }

  async function loadAgenda(options = {}) {
    if (!options.silent) showLoading('Atualizando agenda...', 'Carregando horários, cards e informações dos atendimentos.');
    try {
      const params = new URLSearchParams({ date: state.date, view: state.view, status: state.status, collaboratorId: state.collaboratorId });
      const data = await api.get(`/agenda?${params.toString()}`);
      state.items = data.items || [];
      renderAll();
    } finally {
      if (!options.silent) hideLoading();
    }
  }

  async function openForm(item = null) {
    const prefill = item && item.__prefill ? item : null;
    if (prefill) item = null;
    state.editing = item;
    state.packageEditLocked = false;
    document.getElementById('modal-title').textContent = item ? 'Editar agendamento' : 'Novo agendamento';
    ensureAppointmentTutorAndPetOptions(item || {});
    if (item) populateSelects();
    fields.id.value = item?.id || '';
    fields.whatsapp.value = item?.tutorWhatsapp || (state.tutors.find(t => t.id === item?.tutorId)?.whatsapp || '');
    fields.tutorId.value = item?.tutorId || '';
    renderPetsForTutor({ selectedPetId: item?.petId || '' });
    fields.petId.value = item?.petId || '';
    fields.date.value = item?.startsAt ? String(item.startsAt).slice(0,10) : (prefill?.date || state.date);
    if (fields.date.min !== undefined) fields.date.min = localToday();
    await renderTimes(item?.startsAt ? hm(item.startsAt) : (prefill?.time || ''));
    if (item?.startsAt || prefill?.time) fields.time.value = item?.startsAt ? hm(item.startsAt) : prefill.time;
    fields.status.value = item?.status || 'agendado';
    fields.collab.value = item?.collaboratorId || '';
    fields.paymentStatus.value = item?.paymentStatus || 'pending';
    fields.paymentMethod.value = item?.paymentMethodId || '';
    fields.discount.value = item?.discountPercent || 0;
    fields.notes.value = item?.notes || '';
    renderServiceChecks();
    const ids = new Set((item?.items || []).map(i => i.serviceId));
    fields.services.querySelectorAll('input[type="checkbox"]').forEach(input => { input.checked = ids.has(input.value); });
    applyPackageEditLock(item);
    updateTotal();
    setupPremiumInteractions(nodes.modal);
    nodes.modal.showModal();
  }


  function renderHistoricalPets({ autoSelectSingle = false } = {}) {
    const tutorId = historicalFields.tutorId?.value || '';
    const pets = state.pets.filter(p => !tutorId || p.tutorId === tutorId);
    if (historicalFields.petId) {
      historicalFields.petId.innerHTML = '<option value="">Selecione o pet</option>' + pets.map(p => `<option value="${esc(p.id)}">${esc(p.name)} · ${esc(p.sizeName || p.size || 'sem porte')}</option>`).join('');
      if (autoSelectSingle && pets.length === 1) historicalFields.petId.value = pets[0].id;
    }
    renderHistoricalServiceChecks();
    return pets;
  }

  function renderHistoricalServiceChecks() {
    if (!historicalFields.services) return;
    const pet = petById(historicalFields.petId?.value || '');
    if (!pet) {
      if (historicalFields.serviceCard) historicalFields.serviceCard.hidden = true;
      historicalFields.services.innerHTML = '<p>Selecione um pet para carregar os serviços compatíveis.</p>';
      return;
    }
    if (historicalFields.serviceCard) historicalFields.serviceCard.hidden = false;
    const petSize = pet?.size || 'todos';
    const petType = pet?.species || '';
    const selected = new Set(Array.from(historicalFields.services.querySelectorAll('input:checked')).map(i => i.value));
    const services = state.services.filter(s => {
      const serviceSizeOk = s.petSize === 'todos' || s.petSize === petSize;
      const categorySizeOk = !s.categoryPetSizeCode || s.categoryPetSizeCode === petSize || s.categoryPetSizeCode === 'todos';
      const categoryTypeOk = !s.categoryPetTypeCode || s.categoryPetTypeCode === petType;
      return serviceSizeOk && categorySizeOk && categoryTypeOk;
    });
    const byCategory = new Map();
    services.forEach(service => {
      const key = service.categoryId || 'outros';
      if (!byCategory.has(key)) byCategory.set(key, { name: service.categoryName || 'Outros serviços', items: [] });
      byCategory.get(key).items.push(service);
    });
    historicalFields.services.innerHTML = services.length ? Array.from(byCategory.values()).map(group => `
      <div class="service-type-group">
        <div class="service-type-group-head">
          <span class="service-type-icon" aria-hidden="true">✂️</span>
          <div class="service-type-title"><strong>${esc(group.name)}</strong><small>${group.items.length} serviço(s) apenas para histórico, sem somar valor</small></div>
        </div>
        <div class="service-check-grid-inner">
          ${group.items.map(s => `
            <label class="service-check-card">
              <input type="checkbox" value="${esc(s.id)}" ${selected.has(s.id) ? 'checked' : ''}>
              <span><strong>${esc(s.name)}</strong><small>${esc(s.petSizeName || s.petSize)} · ${s.durationMinutes}min</small></span>
              <b>Histórico</b>
            </label>
          `).join('')}
        </div>
      </div>
    `).join('') : '<p>Nenhum serviço ativo para o tipo e porte deste pet.</p>';
  }

  function setHistoricalWhatsappFeedback(message = '', type = 'muted') {
    if (!historicalFields.whatsappFeedback) return;
    historicalFields.whatsappFeedback.textContent = message || 'Digite o WhatsApp para preencher automaticamente tutor e pets vinculados.';
    historicalFields.whatsappFeedback.dataset.type = type;
  }

  async function lookupHistoricalTutorByWhatsapp() {
    const raw = historicalFields.whatsapp?.value || '';
    const whatsapp = raw.replace(/\D/g, '');
    if (!historicalFields.whatsapp || whatsapp.length < 10) {
      setHistoricalWhatsappFeedback('Digite o WhatsApp com DDD para localizar o tutor.', 'muted');
      return;
    }
    try {
      setHistoricalWhatsappFeedback('Buscando tutor pelo WhatsApp...', 'loading');
      const data = await api.get(`/agenda/client-lookup?whatsapp=${encodeURIComponent(whatsapp)}`);
      if (!data.found || !data.tutor) {
        historicalFields.tutorId.value = '';
        renderHistoricalPets();
        setHistoricalWhatsappFeedback('Tutor não encontrado. Cadastre o tutor antes de importar o agendamento antigo.', 'warning');
        toast('Tutor não encontrado pelo WhatsApp.', 'warning');
        return;
      }
      if (!state.tutors.some(t => t.id === data.tutor.id)) state.tutors.push(data.tutor);
      (data.pets || []).forEach(pet => { if (!state.pets.some(p => p.id === pet.id)) state.pets.push(pet); });
      populateSelects();
      historicalFields.whatsapp.value = data.tutor.whatsapp || raw;
      historicalFields.tutorId.value = data.tutor.id;
      const pets = renderHistoricalPets({ autoSelectSingle: (data.pets || []).length === 1 });
      setHistoricalWhatsappFeedback(`${data.tutor.name || 'Tutor'} encontrado · ${pets.length} pet(s) carregado(s).`, 'success');
      toast('Tutor localizado. Dados preenchidos automaticamente.', 'success');
    } catch (error) {
      setHistoricalWhatsappFeedback(error.message || 'Não foi possível buscar o tutor agora.', 'error');
      toast(error.message || 'Erro ao buscar tutor.', 'error');
    }
  }

  function openHistoricalAppointment() {
    if (!historicalFields.modal) return;
    historicalFields.date.value = state.date || localToday();
    historicalFields.time.value = '09:00';
    historicalFields.description.value = 'Atendimento antigo';
    historicalFields.amount.value = '';
    historicalFields.notes.value = '';
    if (historicalFields.whatsapp) historicalFields.whatsapp.value = '';
    setHistoricalWhatsappFeedback();
    historicalFields.tutorId.value = '';
    renderHistoricalPets();
    const paidOption = [...(historicalFields.paymentStatus?.options || [])].find(o => o.value === 'paid');
    if (paidOption) historicalFields.paymentStatus.value = 'paid';
    setupPremiumInteractions(historicalFields.modal);
    historicalFields.modal.showModal();
  }

  async function saveHistoricalAppointment(event) {
    event.preventDefault();
    const payload = {
      tutorId: historicalFields.tutorId.value,
      petId: historicalFields.petId.value,
      date: historicalFields.date.value,
      time: historicalFields.time.value || '09:00',
      description: historicalFields.description.value || 'Atendimento antigo importado',
      serviceIds: Array.from(historicalFields.services?.querySelectorAll('input:checked') || []).map(i => i.value),
      amountCents: centsFromMoneyInput(historicalFields.amount.value),
      paymentStatus: historicalFields.paymentStatus.value || 'paid',
      paymentMethodId: historicalFields.paymentMethod.value || '',
      notes: historicalFields.notes.value || ''
    };
    if (!payload.tutorId || !payload.petId || !payload.date || payload.amountCents <= 0) {
      await showResultModal({ type: 'error', title: 'Dados obrigatórios', message: 'Preencha tutor, pet, data original e valor final.', okText: 'OK' });
      return;
    }
    try {
      await api.post('/agenda/historical', payload);
      historicalFields.modal.close();
      await loadAgenda({ silent: true });
      await showSuccessModal('Agendamento antigo importado', 'O atendimento foi registrado como finalizado, sem disparar notificações ao tutor.');
    } catch (error) {
      await showResultModal({ type: 'error', title: 'Não foi possível importar', message: error.message || 'Revise os dados e tente novamente.', okText: 'OK' });
    }
  }

  async function saveAppointment(event) {
    event.preventDefault();
    const serviceIds = Array.from(fields.services.querySelectorAll('input:checked')).map(i => i.value);
    const editing = Boolean(fields.id.value);
    const payload = state.packageEditLocked && editing ? {
      startsAt: `${fields.date.value}T${fields.time.value}:00`,
      notes: fields.notes.value,
      packageSessionEdit: true
    } : {
      tutorId: fields.tutorId.value,
      petId: fields.petId.value,
      collaboratorId: fields.collab.value,
      startsAt: `${fields.date.value}T${fields.time.value}:00`,
      status: fields.status.value,
      paymentStatus: fields.paymentStatus.value,
      paymentMethodId: fields.paymentMethod.value,
      serviceIds,
      discountPercent: fields.discount.value,
      notes: fields.notes.value
    };
    if (!fields.time.value || fields.time.disabled || (!editing && isPastSlot(fields.date.value, fields.time.value))) {
      await showResultModal({ type: 'error', title: 'Horário indisponível', message: editing ? 'O horário original do agendamento não foi carregado. Feche o modal e tente editar novamente.' : 'Escolha uma data e horário disponíveis antes de salvar.', okText: 'OK' });
      return;
    }
    try {
      if (editing) await api.put(`/agenda/${fields.id.value}`, payload); else await api.post('/agenda', payload);
      nodes.modal.close();
      await loadAgenda({ silent: true });
      await showSuccessModal(editing ? 'Agendamento atualizado' : 'Agendamento cadastrado', editing ? 'As alterações foram salvas e a agenda já está atualizada.' : 'O atendimento foi cadastrado e já aparece na agenda.');
    } catch (error) {
      await showResultModal({ type: 'error', title: 'Não foi possível salvar', message: error.message || 'Revise os dados do agendamento e tente novamente.', okText: 'OK' });
    }
  }

  nodes.calendar.addEventListener('dragstart', (event) => {
    const card = event.target.closest('.cal-event[data-id]');
    if (!card) return;
    event.dataTransfer.setData('text/plain', card.dataset.id);
    event.dataTransfer.effectAllowed = 'move';
    card.classList.add('is-dragging');
  });
  nodes.calendar.addEventListener('dragend', (event) => {
    event.target.closest('.cal-event')?.classList.remove('is-dragging');
  });
  nodes.calendar.addEventListener('dragover', (event) => {
    const target = event.target.closest('.calendar-drop-target');
    if (!target) return;
    event.preventDefault();
    target.classList.add('is-over');
  });
  nodes.calendar.addEventListener('dragleave', (event) => {
    event.target.closest('.calendar-drop-target')?.classList.remove('is-over');
  });
  nodes.calendar.addEventListener('drop', async (event) => {
    const target = event.target.closest('.calendar-drop-target');
    if (!target) return;
    event.preventDefault();
    target.classList.remove('is-over');
    const id = event.dataTransfer.getData('text/plain');
    await rescheduleAppointment(id, target.dataset.date, target.dataset.slot);
  });

  nodes.date.value = state.date;
  nodes.date.addEventListener('change', async e => { state.date = e.target.value; await loadAgenda(); });
  document.getElementById('agenda-date-picker-btn')?.addEventListener('click', () => {
    if (typeof nodes.date.showPicker === 'function') nodes.date.showPicker();
    else { nodes.date.focus(); nodes.date.click(); }
  });
  nodes.status.addEventListener('change', async e => { state.status = e.target.value; await loadAgenda(); });
  nodes.collab.addEventListener('change', async e => { state.collaboratorId = e.target.value; await loadAgenda(); });
  nodes.search.addEventListener('input', renderAll);
  document.getElementById('today-btn').addEventListener('click', async () => { state.date = new Date().toISOString().slice(0,10); nodes.date.value = state.date; await loadAgenda(); });
  document.getElementById('prev-btn').addEventListener('click', async () => { state.date = dateAdd(state.date, state.view === 'month' ? -30 : state.view === 'week' ? -7 : -1); nodes.date.value = state.date; await loadAgenda(); });
  document.getElementById('next-btn').addEventListener('click', async () => { state.date = dateAdd(state.date, state.view === 'month' ? 30 : state.view === 'week' ? 7 : 1); nodes.date.value = state.date; await loadAgenda(); });
  document.getElementById('view-buttons').addEventListener('click', async e => { const b = e.target.closest('button[data-view]'); if (!b) return; state.view = b.dataset.view; document.querySelectorAll('#view-buttons button').forEach(x => x.classList.toggle('active', x === b)); await loadAgenda(); });
  document.getElementById('new-appointment-btn').addEventListener('click', () => openForm());
  document.getElementById('historical-appointment-btn')?.addEventListener('click', openHistoricalAppointment);
  document.getElementById('close-historical-appointment-modal')?.addEventListener('click', () => historicalFields.modal?.close());
  document.getElementById('cancel-historical-appointment-modal')?.addEventListener('click', () => historicalFields.modal?.close());
  historicalFields.tutorId?.addEventListener('change', () => {
    const tutor = state.tutors.find(t => t.id === historicalFields.tutorId.value);
    if (tutor?.whatsapp && historicalFields.whatsapp) historicalFields.whatsapp.value = tutor.whatsapp;
    const pets = renderHistoricalPets();
    setHistoricalWhatsappFeedback(tutor ? `${tutor.name || 'Tutor'} selecionado · ${pets.length} pet(s) vinculado(s).` : '', tutor ? 'success' : 'muted');
  });
  let historicalWhatsappTimer;
  historicalFields.whatsapp?.addEventListener('input', () => {
    clearTimeout(historicalWhatsappTimer);
    historicalWhatsappTimer = setTimeout(lookupHistoricalTutorByWhatsapp, 450);
  });
  historicalFields.whatsapp?.addEventListener('blur', lookupHistoricalTutorByWhatsapp);
  historicalFields.form?.addEventListener('submit', saveHistoricalAppointment);
  document.getElementById('close-modal').addEventListener('click', () => { applyPackageEditLock(null); nodes.modal.close(); });
  document.getElementById('cancel-modal').addEventListener('click', () => { applyPackageEditLock(null); nodes.modal.close(); });
  document.getElementById('close-document-modal')?.addEventListener('click', () => document.getElementById('agenda-document-modal')?.close());
  messageModal.close?.addEventListener('click', () => messageModal.modal?.close());
  messageModal.cancel?.addEventListener('click', () => messageModal.modal?.close());
  messageModal.send?.addEventListener('click', () => setTimeout(() => messageModal.modal?.close(), 180));
  mediaModal.close?.addEventListener('click', () => mediaModal.modal?.close());
  mediaModal.cancel?.addEventListener('click', () => mediaModal.modal?.close());
  mediaModal.form?.addEventListener('submit', saveAppointmentMedia);
  mediaModal.file?.addEventListener('change', () => {
    const file = mediaModal.file?.files?.[0];
    if (file?.type?.startsWith('video/') && mediaModal.type) mediaModal.type.value = 'video';
    if (file?.type?.startsWith('image/') && mediaModal.type) mediaModal.type.value = 'photo';
  });
  mediaModal.copyLink?.addEventListener('click', async () => {
    const link = mediaModal.shareLink?.value || '';
    if (!link) return toast('Gere o link salvando um momento primeiro.', 'warning');
    try {
      await navigator.clipboard.writeText(link);
      toast('Link Momentos Especiais copiado.', 'success');
    } catch (_) {
      toast('Não foi possível copiar automaticamente. Selecione o campo e copie manualmente.', 'warning');
      mediaModal.shareLink?.select?.();
    }
  });
  document.getElementById('print-agenda-document')?.addEventListener('click', () => window.print());
  document.getElementById('copy-agenda-document-link')?.addEventListener('click', async (event) => {
    const url = event.currentTarget.dataset.publicUrl;
    if (!url) return toast('A comanda não possui link público. Gere o recibo após o pagamento para compartilhar o link.', 'warning');
    await navigator.clipboard.writeText(url);
    toast('Link copiado para a área de transferência.', 'success');
  });
  fields.whatsapp?.addEventListener('input', (event) => {
    const d = event.target.value.replace(/\D/g, '').replace(/^55/, '').slice(0, 11);
    event.target.value = d.length > 7 ? `(${d.slice(0,2)}) ${d.slice(2,7)}-${d.slice(7)}` : d.length > 2 ? `(${d.slice(0,2)}) ${d.slice(2)}` : d;
  });
  fields.whatsapp?.addEventListener('blur', lookupClientByWhatsapp);
  fields.tutorId?.addEventListener('change', () => { renderPetsForTutor({ autoSelectSingle: true }); completeFieldsFromSelection({ forceNotes: true }); });
  fields.petId?.addEventListener('change', () => { completeFieldsFromSelection({ forceNotes: true }); renderServiceChecks(); });
  fields.date?.addEventListener('change', () => renderTimes(''));
  if (fields.date && fields.date.min !== undefined) fields.date.min = localToday();
  fields.services?.addEventListener('change', updateTotal);
  fields.discount?.addEventListener('input', updateTotal);
  nodes.form?.addEventListener('submit', saveAppointment);
  // v1.6.19: não fechar o menu dos 3 pontinhos ao rolar; ele tem scroll interno próprio.
  window.addEventListener('resize', closeFloatingMenus);
  document.addEventListener('pointerdown', e => {
    const kebabButton = e.target.closest('[data-agenda-menu-button="true"], .agenda-kebab-btn, .kebab-btn');
    if (kebabButton) {
      e.preventDefault();
      e.stopPropagation();
      window.__agendaMenuPointerHandled = true;
      openFloatingMenu(kebabButton);
      setTimeout(() => { window.__agendaMenuPointerHandled = false; }, 350);
      return;
    }
    if (!e.target.closest('#agenda-global-action-menu')) closeFloatingMenus();
  }, true);

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeFloatingMenus();
    const kebabButton = e.target.closest?.('[data-agenda-menu-button="true"], .agenda-kebab-btn, .kebab-btn');
    if (kebabButton && (e.key === 'Enter' || e.key === ' ')) {
      e.preventDefault();
      openFloatingMenu(kebabButton);
    }
  }, true);

  document.addEventListener('click', async e => {
    const quick = e.target.closest('.quick-schedule-btn');
    if (quick) {
      e.preventDefault();
      e.stopPropagation();
      await openForm({ __prefill: true, date: quick.dataset.newDate || state.date, time: quick.dataset.newTime || '' });
      return;
    }
    const kebabButton = e.target.closest('[data-agenda-menu-button="true"], .agenda-kebab-btn, .kebab-btn');
    if (kebabButton) {
      e.preventDefault();
      e.stopPropagation();
      if (!window.__agendaMenuPointerHandled) openFloatingMenu(kebabButton);
      return;
    }
    if (!e.target.closest('.agenda-global-action-menu')) closeFloatingMenus();
    const commandButton = e.target.closest('.view-command-modal');
    if (commandButton) {
      e.preventDefault();
      e.stopPropagation();
      closeFloatingMenus();
      await openAgendaDocumentModal(commandButton.dataset.id, 'command');
      return;
    }
    const receiptButton = e.target.closest('.view-receipt-modal');
    if (receiptButton) {
      e.preventDefault();
      e.stopPropagation();
      closeFloatingMenus();
      await openAgendaDocumentModal(receiptButton.dataset.id, 'receipt');
      return;
    }
    const mediaButton = e.target.closest('.appointment-media-action');
    if (mediaButton) {
      e.preventDefault();
      e.stopPropagation();
      closeFloatingMenus();
      openAppointmentMediaModal(mediaButton.dataset.id);
      return;
    }
    const aiMsg = e.target.closest('.ai-status-message-action');
    if (aiMsg) {
      e.preventDefault();
      e.stopPropagation();
      closeFloatingMenus();
      await openStatusMessageModal(aiMsg.dataset.id);
      return;
    }
    const status = e.target.closest('.status-action');
    if (status) {
      e.preventDefault();
      closeFloatingMenus();
      try { await api.patch(`/agenda/${status.dataset.id}/status`, { status: status.dataset.status }); await loadAgenda({ silent: true }); await openStatusMessageModal(status.dataset.id, status.dataset.status); }
      catch (error) { toast(error.message, 'error'); }
      return;
    }
    const deleteAppointment = e.target.closest('.delete-appointment-action');
    if (deleteAppointment) {
      e.preventDefault();
      e.stopPropagation();
      const id = deleteAppointment.dataset.id || deleteAppointment.closest('[data-id]')?.dataset.id;
      closeFloatingMenus();
      if (!id) return;
      const appointment = state.items.find(item => item.id === id) || {};
      const petName = appointment.petName || 'este pet';
      const timeLabel = appointment.startsAt ? `${hm(appointment.startsAt)} · ${petName}` : petName;
      const confirmed = window.confirm(`Excluir o agendamento de ${timeLabel}?\n\nEssa ação remove o atendimento da agenda sem disparar notificações ao tutor.`);
      if (!confirmed) return;
      try {
        await api.delete(`/agenda/${id}`);
        toast('Agendamento excluído da agenda.', 'success');
        await loadAgenda({ silent: true });
      } catch (error) {
        toast(error.message || 'Não foi possível excluir o agendamento.', 'error');
      }
      return;
    }
    const edit = e.target.closest('.edit-appointment');
    if (edit) {
      if (e.target.closest('.card-menu a')) return;
      const id = edit.dataset.id || edit.closest('[data-id]')?.dataset.id;
      if (!id) return;
      closeFloatingMenus();
      const full = await api.get(`/agenda/${id}`);
      await openForm(full.appointment);
    }
  });

  async function applyAppointmentPrefillFromQuery() {
    const params = new URLSearchParams(window.location.search);
    if (params.get('new') !== '1') return;
    const tutorId = params.get('tutorId') || '';
    const petId = params.get('petId') || '';
    const date = params.get('date') || state.date;
    const time = params.get('time') || '';
    await openForm({ __prefill: true, date, time });
    if (tutorId && fields.tutorId.querySelector(`option[value="${CSS.escape(tutorId)}"]`)) {
      fields.tutorId.value = tutorId;
      const tutor = state.tutors.find(t => t.id === tutorId);
      if (tutor?.whatsapp) fields.whatsapp.value = tutor.whatsapp;
      renderPetsForTutor({ autoSelectSingle: !petId });
      if (petId && fields.petId.querySelector(`option[value="${CSS.escape(petId)}"]`)) fields.petId.value = petId;
      completeFieldsFromSelection({ forceNotes: true });
      renderServiceChecks();
    }
    history.replaceState({}, '', '/admin/agenda');
  }

  try {
    await loadBaseData();
    await loadAgenda({ silent: true });
    await applyAppointmentPrefillFromQuery();
  } catch (error) {
    toast(error.message, 'error');
  } finally {
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        finishPageLoading();
        hideLoading();
      });
    });
  }
</script>
</body>
</html>
