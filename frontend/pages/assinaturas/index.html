<!doctype html>
<html lang="pt-BR">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Assinaturas · PetFunny OS</title><link rel="stylesheet" href="/assets/css/app.css"></head>
<body>
<script type="module">
  import { buildShell } from '/assets/js/shell.js';
  import { api } from '/assets/js/api.js';
  import { withLoading, hideLoading } from '/assets/js/loading.js';
  import { toast } from '/assets/js/toast.js';
  const money=(c=0)=>(Number(c||0)/100).toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
  const today = new Date().toISOString().slice(0,10);
  const next = new Date(Date.now()+30*86400000).toISOString().slice(0,10);
  const content = `
    <section class="kpi-grid spacious-grid"><article class="metric-card"><span>Assinaturas ativas</span><strong id="sub-active">—</strong><small>Clientes recorrentes</small></article><article class="metric-card"><span>Receita recorrente</span><strong id="sub-mrr">—</strong><small>Previsão mensal</small></article><article class="metric-card"><span>Total</span><strong id="sub-total">—</strong><small>Histórico cadastrado</small></article></section>
    <section class="panel page-section"><div class="panel-head"><div><p class="eyebrow">Recorrência</p><h2>Assinaturas</h2><p>Controle mensal de planos recorrentes vinculados a tutores, pets e pacotes.</p></div><button class="btn" id="new-sub">＋ Nova assinatura</button></div><div class="filter-row"><select class="select" id="sub-status"><option value="all">Todas</option><option value="active">Ativas</option><option value="paused">Pausadas</option><option value="canceled">Canceladas</option></select><button class="btn secondary" id="reload">Atualizar</button></div><div class="table-scroll custom-scroll"><table><thead><tr><th>Assinatura</th><th>Tutor/Pet</th><th>Recorrência</th><th>Próxima cobrança</th><th>Valor</th><th>Status</th><th></th></tr></thead><tbody id="subs-table"><tr><td colspan="7">Preparando tudo...</td></tr></tbody></table></div></section>
    <dialog class="modal" id="sub-modal"><form method="dialog" class="modal-card"><header class="modal-header"><div><p class="eyebrow">Assinatura</p><h2 id="sub-title">Nova assinatura</h2></div><button class="icon-button" value="cancel">✕</button></header><div class="modal-body custom-scroll"><input type="hidden" id="sub-id"><div class="form-grid form-row-gap"><label class="form-field"><span>Nome</span><input class="input" id="sub-name" placeholder="Assinatura banho mensal"></label><label class="form-field"><span>Tutor</span><select class="select" id="sub-tutor"></select></label><label class="form-field"><span>Pet</span><select class="select" id="sub-pet"></select></label><label class="form-field"><span>Pacote vinculado</span><select class="select" id="sub-package"></select></label><label class="form-field"><span>Valor</span><input class="input" id="sub-amount" data-mask="money" placeholder="199,90"></label><label class="form-field"><span>Recorrência</span><select class="select" id="sub-recurrence"><option value="monthly">Mensal</option><option value="weekly">Semanal</option><option value="quarterly">Trimestral</option></select></label><label class="form-field"><span>Início</span><input class="input" id="sub-starts" type="date" value="${today}"></label><label class="form-field"><span>Próxima cobrança</span><input class="input" id="sub-next" type="date" value="${next}"></label><label class="form-field"><span>Status</span><select class="select" id="sub-status-field"><option value="active">Ativa</option><option value="paused">Pausada</option><option value="canceled">Cancelada</option></select></label><label class="form-field"><span>Pagamento preferido</span><input class="input" id="sub-payment" placeholder="Pix"></label></div><label class="form-field"><span>Observações</span><textarea class="textarea" id="sub-notes" rows="3"></textarea></label></div><footer class="modal-footer"><button class="btn secondary" value="cancel">Cancelar</button><button class="btn" id="save-sub" value="default">Salvar assinatura</button></footer></form></dialog>
  `;
  buildShell({ active:'Assinaturas', eyebrow:'Receita recorrente', title:'Assinaturas', subtitle:'Controle assinaturas, cobranças previstas e recorrência de tutores que mantêm rotina fixa de cuidados no PetFunny.', content });
  const $=id=>document.getElementById(id); let options={tutors:[],pets:[],packages:[]}, items=[];
  function cents(v){ const s=String(v||'').replace(/\./g,'').replace(',','.').replace(/[^0-9.]/g,''); return Math.round(Number(s||0)*100); }
  function renderOptions(){ $('sub-tutor').innerHTML='<option value="">Selecione</option>'+options.tutors.map(t=>`<option value="${t.id}">${t.name}</option>`).join(''); $('sub-package').innerHTML='<option value="">Sem pacote</option>'+options.packages.map(p=>`<option value="${p.id}">${p.name} · ${money(p.priceCents)}</option>`).join(''); renderPets(); }
  function renderPets(){ const tutor=$('sub-tutor')?.value; $('sub-pet').innerHTML='<option value="">Selecione</option>'+options.pets.filter(p=>!tutor||p.tutorId===tutor).map(p=>`<option value="${p.id}">${p.name}</option>`).join(''); }
  function render(){ $('subs-table').innerHTML = items.map(s=>`<tr><td><strong>${s.name}</strong><br><small>${s.packageName||'Sem pacote vinculado'}</small></td><td>${s.tutorName||'—'}<br><small>${s.petName||''}</small></td><td>${s.recurrence}</td><td>${s.nextBillingOn||'—'}</td><td>${money(s.amountCents)}</td><td><span class="badge">${s.status}</span></td><td><button class="btn secondary edit-sub" data-id="${s.id}">Editar</button></td></tr>`).join('') || '<tr><td colspan="7">Nenhuma assinatura cadastrada.</td></tr>'; document.querySelectorAll('.edit-sub').forEach(b=>b.addEventListener('click',()=>openSub(b.dataset.id))); }
  async function load(){ await withLoading(async()=>{ const [opt, data] = await Promise.all([api.get('/api/pacotes/options'), api.get(`/api/assinaturas?status=${$('sub-status').value}`)]); options=opt; items=data.items||[]; $('sub-active').textContent=data.summary?.active ?? '0'; $('sub-total').textContent=data.summary?.total ?? '0'; $('sub-mrr').textContent=money(data.summary?.monthly_recurring_cents||0); renderOptions(); render(); }, 'Carregando assinaturas...'); }
  function openSub(id){ const s=items.find(x=>x.id===id); $('sub-id').value=s?.id||''; $('sub-title').textContent=s?'Editar assinatura':'Nova assinatura'; $('sub-name').value=s?.name||''; $('sub-amount').value=s?(s.amountCents/100).toFixed(2).replace('.',','):''; $('sub-recurrence').value=s?.recurrence||'monthly'; $('sub-starts').value=s?.startsOn||today; $('sub-next').value=s?.nextBillingOn||next; $('sub-status-field').value=s?.status||'active'; $('sub-payment').value=s?.paymentMethod||'Pix'; $('sub-notes').value=s?.notes||''; renderOptions(); setTimeout(()=>{ if(s){$('sub-tutor').value=s.tutorId||''; renderPets(); $('sub-pet').value=s.petId||''; $('sub-package').value=s.packageId||'';} },0); $('sub-modal').showModal(); }
  async function save(ev){ ev.preventDefault(); const payload={ name:$('sub-name').value, tutorId:$('sub-tutor').value, petId:$('sub-pet').value, packageId:$('sub-package').value, amountCents:cents($('sub-amount').value), recurrence:$('sub-recurrence').value, startsOn:$('sub-starts').value, nextBillingOn:$('sub-next').value, status:$('sub-status-field').value, paymentMethod:$('sub-payment').value, notes:$('sub-notes').value }; const id=$('sub-id').value; await withLoading(async()=>{ id ? await api.put(`/api/assinaturas/${id}`, payload) : await api.post('/api/assinaturas', payload); $('sub-modal').close(); await load(); toast.success('Assinatura salva.'); }, 'Salvando assinatura...'); }
  $('new-sub').addEventListener('click',()=>openSub()); $('save-sub').addEventListener('click', save); $('reload').addEventListener('click', load); $('sub-status').addEventListener('change', load); $('sub-tutor').addEventListener('change', renderPets); load().finally(hideLoading);
</script>
</body>
</html>
